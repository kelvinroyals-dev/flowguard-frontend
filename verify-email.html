<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Flow Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #1b5e8c 0%, #2c9aa3 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-2xl mb-6">
                <svg class="w-10 h-10 text-[#2a7096]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white">Flow Guard</h1>
        </div>
        
        <!-- Verification Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 text-center" id="verification-card">
            
            <!-- Loading State -->
            <div id="loading-state">
                <svg class="animate-spin h-16 w-16 mx-auto text-[#2a7096] mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-600">Verifying your email...</p>
            </div>
            
            <!-- Success State -->
            <div id="success-state" class="hidden">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Email Verified!</h2>
                <p class="text-gray-600 mb-6">Your account has been successfully verified.</p>
                <a href="login.html" class="inline-block bg-gradient-to-r from-[#2a7096] to-[#2c9aa3] text-white px-8 py-3 rounded-xl font-bold hover:shadow-lg transition-all">
                    Go to Login
                </a>
            </div>
            
            <!-- Error State -->
            <div id="error-state" class="hidden">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Verification Failed</h2>
                <p class="text-gray-600 mb-6" id="error-message">Invalid or expired verification link.</p>
                <a href="login.html" class="inline-block text-[#2a7096] font-bold hover:text-[#1b5e8c]">
                    Back to Login
                </a>
            </div>
            
        </div>
        
    </div>
    
    <script src="js/api.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        // Verify email on page load
        async function verifyEmail() {
            if (!token) {
                showError('No verification token provided');
                return;
            }
            
            try {
                const response = await fetch(`https://api.flowguard.ng/api/v1/auth/verify-email?token=${token}`);
                const data = await response.json();
                
                if (data.success) {
                    showSuccess();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                console.error('Verification error:', error);
                showError('Failed to verify email. Please try again.');
            }
        }
        
        function showSuccess() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        }
        
        function showError(message) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-state').classList.remove('hidden');
        }
        
        // Verify on page load
        verifyEmail();
    </script>
    
</body>
</html>
