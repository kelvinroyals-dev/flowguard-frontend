<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login — FlowGuard</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
/* Portal design system — matches index.html */
:root{
  --bg:#eef2f4; --surface:#ffffff; --surface-2:#f7fafb; --line:#e2e9ed; --line-2:#d3dde2;
  --ink:#12222b; --ink-2:#4a626d; --ink-3:#8399a4;
  --brand:#0891b2; --brand-2:#06b6d4; --brand-deep:#0e5b6e; --brand-soft:#e0f5fa;
  --ok:#10b981; --ok-bg:#e6f7f1; --warn:#f59e0b; --warn-bg:#fef4e2; --alert:#ef4444; --alert-bg:#fdeceb;
  --r:20px; --rs:13px; --rx:9px;
  --sh:0 2px 4px rgba(18,34,43,.03), 0 12px 32px rgba(18,34,43,.06);
  --sh-sm:0 1px 2px rgba(18,34,43,.05);
  --ff:'Inter',sans-serif; --ff-d:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ff);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow-x:hidden}
/* subtle brand wash behind everything */
body::before{content:"";position:fixed;inset:0;background:radial-gradient(1000px 500px at 50% -10%, var(--brand-soft), transparent 70%);pointer-events:none;z-index:0}

/* flowing water design at bottom — original, untouched */
.wave-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      overflow: hidden;
      z-index: 0;
      opacity: 0.7;
    }
    .wave-strip svg {
      width: 200%; height: 100%;
      animation: wave-scroll 14s linear infinite;
    }
    @keyframes wave-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

.page-wrap{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
.brand-header{text-align:center;margin-bottom:26px}
.brand-header .logo{height:44px;width:auto;margin:0 auto 14px;display:block}
.brand-name{font-family:var(--ff-d);font-size:24px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.brand-tagline{font-size:12.5px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--brand);margin-top:4px}
/* corner logo — top-left on desktop */
.corner-logo{position:fixed;top:28px;left:32px;z-index:2;display:block}
.corner-logo img{height:38px;width:auto;display:block}
@media(max-width:640px){
  .corner-logo{position:static;text-align:center;margin:0 auto 20px}
  .corner-logo img{height:40px;margin:0 auto}
}

.card{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:32px 30px}
.card-title{font-family:var(--ff-d);font-size:22px;font-weight:600;letter-spacing:-.01em}
.card-sub{color:var(--ink-2);font-size:14px;margin:6px 0 24px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink-2)}
.field input{width:100%;padding:12px 14px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px;transition:.15s}
.field input:focus{outline:none;border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-soft)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink-3);cursor:pointer;padding:8px;display:grid;place-items:center}
.pw-toggle:hover{color:var(--brand)}
.pw-toggle svg{width:20px;height:20px}

.form-footer-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0 20px}
.remember-label{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink-2);cursor:pointer}
.remember-label input{width:16px;height:16px;accent-color:var(--brand)}
.forgot-link{color:var(--brand);font-size:13.5px;font-weight:500;text-decoration:none}
.forgot-link:hover{text-decoration:underline}

.btn-primary{width:100%;padding:13px;border-radius:100px;background:var(--brand);color:#fff;border:none;font-family:var(--ff-d);font-size:15px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover:not(:disabled){background:var(--brand-deep)}
.btn-primary:disabled{opacity:.7;cursor:default}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#alert-area{margin-top:14px}
.alert{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-radius:var(--rx);font-size:13.5px;line-height:1.4}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.alert-error{background:var(--alert-bg);color:#b42318}
.alert-success{background:var(--ok-bg);color:#087443}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--ink-3);font-size:12.5px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.social-row{display:flex;gap:10px}
.social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface);color:var(--ink-2);font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s;text-decoration:none}
.social-btn:hover{background:var(--bg);border-color:var(--brand)}
.social-btn svg,.social-btn img{width:18px;height:18px}

.signup-row{text-align:center;margin-top:22px;font-size:14px;color:var(--ink-2)}
.signup-row a{color:var(--brand);font-weight:600;text-decoration:none}
.signup-row a:hover{text-decoration:underline}
</style>
</head>
<body>

  <div class="wave-strip" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C120,20 240,60 360,40 C480,20 600,60 720,40 C840,20 960,60 1080,40 C1200,20 1320,60 1440,40 L1440,80 L0,80 Z" fill="#16a8d3"/>
      <path d="M0,55 C120,35 240,70 360,55 C480,35 600,70 720,55 C840,35 960,70 1080,55 C1200,35 1320,70 1440,55 L1440,80 L0,80 Z" fill="#0d7fa0" opacity="0.6"/>
    </svg>
  </div>

  <a href="login.html" class="corner-logo"><img src="fg-logo-light.png" alt="FlowGuard"></a>

  <main class="page-wrap">
    <div class="card">
      <div class="card-title">Welcome</div>
      <div class="card-sub">Sign in to access your service dashboard</div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="you@company.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <svg id="eye-show" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg id="eye-hide" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <div class="form-footer-row">
          <label class="remember-label" for="remember"><input type="checkbox" id="remember" name="remember"> Remember me</label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn"><span class="btn-inner" id="btn-content">Sign In</span></button>
        <div id="alert-area"></div>
      </form>
    </div>

    <div class="signup-row">Don't have an account? <a href="signup.html">Request a site audit →</a></div>
  </main>

  <script>
    const pwInput=document.getElementById('password'),pwToggle=document.getElementById('pw-toggle'),eyeShow=document.getElementById('eye-show'),eyeHide=document.getElementById('eye-hide');
    pwToggle.addEventListener('click',()=>{const h=pwInput.type==='password';pwInput.type=h?'text':'password';eyeShow.style.display=h?'none':'block';eyeHide.style.display=h?'block':'none';});
    function showAlert(type,message){const area=document.getElementById('alert-area');area.innerHTML='';const icon=type==='error'?'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>':'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';const div=document.createElement('div');div.className='alert alert-'+type;div.innerHTML=icon+'<span>'+message+'</span>';area.appendChild(div);if(type==='error')setTimeout(()=>div.remove(),6000);}
    function setLoading(loading){const btn=document.getElementById('submit-btn'),content=document.getElementById('btn-content');btn.disabled=loading;content.innerHTML=loading?'<div class="spinner"></div><span>Signing in…</span>':'Sign In';}
    document.getElementById('login-form').addEventListener('submit',async function(e){
      e.preventDefault();
      const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;
      if(!email||!password){showAlert('error','Please enter your email and password.');return;}
      setLoading(true);
      try{
        const response=await fetch('https://api.flowguard.ng/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data=await response.json();
        if(data.success){
          localStorage.setItem('token',data.data.token);
          localStorage.setItem('user',JSON.stringify(data.data.user));
          showAlert('success','Login successful — redirecting…');
          setTimeout(()=>{
            const role=data.data.user.role;
            const OPS_ROLES=['admin','operations','super_admin','operations_manager','dispatcher','field_lead','analyst','finance'];
            window.location.href=OPS_ROLES.includes(role)?'https://neon.flowguard.ng':'index.html';
          },800);
        }else{setLoading(false);showAlert('error',data.error||'Invalid email or password. Please try again.');}
      }catch(err){console.error('Login error:',err);setLoading(false);showAlert('error','Connection failed. Please check your internet and try again.');}
    });
  </script>
</body>
</html>
