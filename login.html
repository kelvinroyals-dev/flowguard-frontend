<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login — FlowGuard</title>

  <!-- Favicon: brand mark as inline SVG data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='64' height='64' viewBox='232 74 216 216' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='340' cy='182' r='108' fill='%230a2a3d'/%3E%3Ccircle cx='340' cy='182' r='108' fill='none' stroke='%231cb8e8' stroke-width='3' opacity='0.5'/%3E%3Crect x='232' y='214' width='216' height='90' fill='%230d7fa0' clip-path='url(%23c)'/%3E%3CclipPath id='c'%3E%3Ccircle cx='340' cy='182' r='108'/%3E%3C/clipPath%3E%3Cpath d='M340 110 C358 132 374 148 374 166 C374 186 358 202 340 202 C322 202 306 186 306 166 C306 148 322 132 340 110Z' fill='%2316a8d3'/%3E%3Cpath d='M340 128 C352 144 361 156 361 166 C361 180 352 191 340 191 C328 191 319 180 319 166 C319 156 328 144 340 128Z' fill='%230d7fa0'/%3E%3Ccircle cx='340' cy='110' r='6' fill='%23f5a623'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:        #0a2a3d;
      --navy-mid:    #0d3550;
      --navy-light:  #103d5e;
      --cyan:        #16a8d3;
      --cyan-bright: #1cb8e8;
      --teal:        #0d7fa0;
      --amber:       #f5a623;
      --amber-dim:   #d4901e;
      --pale:        #cceeff;
      --text-main:   #e8f4f8;
      --text-muted:  #6fa8c0;
      --border:      rgba(22, 168, 211, 0.18);
      --border-focus: rgba(22, 168, 211, 0.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--navy);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow: hidden;
      position: relative;
    }

    /* ── BACKGROUND ATMOSPHERE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 20%, rgba(22,168,211,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(13,127,160,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 30% 25% at 50% 0%, rgba(245,166,35,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* subtle grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(22,168,211,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,168,211,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── WATER WAVE BOTTOM ── */
    .wave-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      overflow: hidden;
      z-index: 0;
      opacity: 0.35;
    }
    .wave-strip svg {
      width: 200%; height: 100%;
      animation: wave-scroll 14s linear infinite;
    }
    @keyframes wave-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── SIGNAL RINGS (decorative, top-left) ── */
    .signal-rings {
      position: fixed;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      opacity: 0.07;
      z-index: 0;
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    /* ── LOGO HEADER ── */
    .brand-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fade-down 0.6s ease both;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(22,168,211,0.35));
      animation: pulse-glow 4s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(22,168,211,0.3)); }
      50%       { filter: drop-shadow(0 0 28px rgba(22,168,211,0.55)); }
    }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .brand-tagline {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── CARD ── */
    .card {
      background: rgba(13, 53, 80, 0.55);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: fade-up 0.7s ease 0.1s both;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ── FORM ELEMENTS ── */
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(10, 42, 61, 0.7);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder {
      color: rgba(111, 168, 192, 0.45);
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(22,168,211,0.12);
      background: rgba(10, 42, 61, 0.9);
    }

    /* password wrapper */
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      padding-right: 44px;
    }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--cyan); }
    .pw-toggle svg { width: 18px; height: 18px; }

    /* ── REMEMBER + FORGOT ── */
    .form-footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      margin-top: -4px;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .remember-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--cyan);
      cursor: pointer;
    }
    .forgot-link {
      font-size: 13px;
      color: var(--cyan);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--pale); }

    /* ── PRIMARY BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dim) 100%);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255,255,255,0.12), transparent);
      pointer-events: none;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,166,35,0.3);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10,42,61,0.3);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── SOCIAL BUTTONS ── */
    .social-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 8px;
    }
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      background: rgba(10, 42, 61, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-social:hover {
      border-color: rgba(22,168,211,0.4);
      background: rgba(22,168,211,0.07);
    }
    .btn-social svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── SIGNUP LINK ── */
    .signup-prompt {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-muted);
      margin-top: 28px;
    }
    .signup-prompt a {
      color: var(--cyan);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }
    .signup-prompt a:hover { color: var(--pale); }

    /* ── FOOTER ── */
    .page-footer {
      text-align: center;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: fade-up 0.8s ease 0.25s both;
    }
    .page-footer a {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .page-footer a:hover { color: var(--cyan); }
    .page-footer span { color: var(--border); font-size: 12px; }

    /* ── ALERT MESSAGES ── */
    .alert {
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13.5px;
      font-weight: 500;
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.4;
      animation: fade-up 0.3s ease;
    }
    .alert-error {
      background: rgba(220, 38, 38, 0.12);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #6ee7b7;
    }
    .alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── KEYFRAMES ── */
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Decorative signal rings top-right -->
  <svg class="signal-rings" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="200" r="190" stroke="#16a8d3" stroke-width="1"/>
    <circle cx="200" cy="200" r="155" stroke="#16a8d3" stroke-width="1"/>
    <circle cx="200" cy="200" r="120" stroke="#1cb8e8" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="85"  stroke="#1cb8e8" stroke-width="2"/>
    <line x1="200" y1="10"  x2="200" y2="0"   stroke="#f5a623" stroke-width="3" stroke-linecap="round"/>
    <line x1="390" y1="200" x2="400" y2="200"  stroke="#f5a623" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="390" x2="200" y2="400"  stroke="#f5a623" stroke-width="3" stroke-linecap="round"/>
    <line x1="10"  y1="200" x2="0"   y2="200"  stroke="#f5a623" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <!-- Water wave bottom strip -->
  <div class="wave-strip" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C120,20 240,60 360,40 C480,20 600,60 720,40 C840,20 960,60 1080,40 C1200,20 1320,60 1440,40 L1440,80 L0,80 Z" fill="#16a8d3"/>
      <path d="M0,55 C120,35 240,70 360,55 C480,35 600,70 720,55 C840,35 960,70 1080,55 C1200,35 1320,70 1440,55 L1440,80 L0,80 Z" fill="#0d7fa0" opacity="0.6"/>
    </svg>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <main class="page-wrap">

    <!-- Brand header -->
    <div class="brand-header">
      <!-- Inline SVG logo mark (scaled) -->
      <svg class="logo-mark" viewBox="200 60 280 270" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="mb-clip">
            <circle cx="340" cy="182" r="108"/>
          </clipPath>
        </defs>
        <!-- Signal rings -->
        <circle cx="340" cy="182" r="148" fill="none" stroke="#16a8d3" stroke-width="1.2" opacity="0.15"/>
        <circle cx="340" cy="182" r="132" fill="none" stroke="#16a8d3" stroke-width="1.4" opacity="0.25"/>
        <circle cx="340" cy="182" r="118" fill="none" stroke="#1cb8e8" stroke-width="1.8" opacity="0.35"/>
        <!-- Main circle -->
        <circle cx="340" cy="182" r="108" fill="#0a2a3d"/>
        <!-- Water body -->
        <g clip-path="url(#mb-clip)">
          <rect x="232" y="214" width="216" height="90" fill="#0d7fa0"/>
          <path d="M232 214 Q254 200 276 214 Q298 228 320 214 Q342 200 364 214 Q386 228 408 214 Q430 200 448 210 L448 216 Q430 202 408 216 Q386 230 364 216 Q342 202 320 216 Q298 230 276 216 Q254 202 232 216 Z" fill="#16a8d3"/>
          <path d="M232 234 Q254 226 276 234 Q298 242 320 234 Q342 226 364 234 Q386 242 408 234 Q430 226 448 231" fill="none" stroke="#1cb8e8" stroke-width="1.5" opacity="0.5"/>
          <ellipse cx="284" cy="250" rx="12" ry="3" fill="#cceeff" opacity="0.35"/>
          <ellipse cx="362" cy="264" rx="8" ry="2" fill="#cceeff" opacity="0.3"/>
        </g>
        <!-- Circle border -->
        <circle cx="340" cy="182" r="108" fill="none" stroke="#1cb8e8" stroke-width="2.5" opacity="0.4"/>
        <!-- Droplet -->
        <path d="M340 110 C358 132 374 148 374 166 C374 186 358 202 340 202 C322 202 306 186 306 166 C306 148 322 132 340 110 Z" fill="#16a8d3"/>
        <path d="M340 120 C355 139 367 153 367 166 C367 183 355 196 340 196 C325 196 313 183 313 166 C313 153 325 139 340 120 Z" fill="#0a2a3d"/>
        <path d="M340 128 C352 144 361 156 361 166 C361 180 352 191 340 191 C328 191 319 180 319 166 C319 156 328 144 340 128 Z" fill="#0d7fa0"/>
        <ellipse cx="331" cy="146" rx="5" ry="8" fill="#cceeff" opacity="0.55" transform="rotate(-18 331 146)"/>
        <!-- Amber dot -->
        <circle cx="340" cy="110" r="6" fill="#f5a623"/>
        <circle cx="340" cy="110" r="10" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
        <circle cx="340" cy="110" r="15" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.25"/>
        <!-- Signal arcs -->
        <path d="M318 105 Q340 93 362 105" fill="none" stroke="#1cb8e8" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
        <path d="M307 93 Q340 77 373 93" fill="none" stroke="#1cb8e8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
        <!-- Tick marks -->
        <line x1="340" y1="72" x2="340" y2="62" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="448" y1="182" x2="458" y2="182" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="232" y1="182" x2="222" y2="182" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="340" y1="292" x2="340" y2="302" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      </svg>

      <div class="brand-name">FlowGuard</div>
      <div class="brand-tagline">Drainage-as-a-Service Platform</div>
    </div>

    <!-- Login card -->
    <div class="card">
      <div class="card-title">Client Portal</div>
      <div class="card-sub">Sign in to access your service dashboard</div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@company.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <!-- Eye icon -->
              <svg id="eye-show" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <!-- Eye-off icon (hidden by default) -->
              <svg id="eye-hide" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-footer-row">
          <label class="remember-label" for="remember">
            <input type="checkbox" id="remember" name="remember">
            Remember me
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-inner" id="btn-content">Sign In</span>
        </button>

        <!-- Alert messages -->
        <div id="alert-area"></div>

        <!-- Divider -->
        <div class="divider">or continue with</div>

        <!-- Social buttons -->
        <div class="social-row">
          <button type="button" class="btn-social">
            <!-- Google SVG -->
            <svg viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button type="button" class="btn-social">
            <!-- Apple SVG -->
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.955 4.45z"/>

            Apple

  </main>

  <script>
    // ── Password toggle ──
    const pwInput  = document.getElementById('password');
    const pwToggle = document.getElementById('pw-toggle');
    const eyeShow  = document.getElementById('eye-show');
    const eyeHide  = document.getElementById('eye-hide');

    pwToggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      eyeShow.style.display = isHidden ? 'none' : 'block';
      eyeHide.style.display = isHidden ? 'block' : 'none';
    });

    // ── Alert helpers ──
    function showAlert(type, message) {
      const area = document.getElementById('alert-area');
      area.innerHTML = '';
      const icon = type === 'error'
        ? `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`
        : `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;
      const div = document.createElement('div');
      div.className = `alert alert-${type}`;
      div.innerHTML = icon + `<span>${message}</span>`;
      area.appendChild(div);
      if (type === 'error') setTimeout(() => div.remove(), 6000);
    }

    function setLoading(loading) {
      const btn     = document.getElementById('submit-btn');
      const content = document.getElementById('btn-content');
      btn.disabled  = loading;
      content.innerHTML = loading
        ? `<div class="spinner"></div><span>Signing in…</span>`
        : 'Sign In';
    }

    // ── Form submission ──
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('error', 'Please enter your email and password.');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('https://api.flowguard.ng/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          showAlert('success', 'Login successful — redirecting…');
          setTimeout(() => {
            const role = data.data.user.role;
            const OPS_ROLES = ['admin','operations','super_admin','operations_manager','dispatcher','field_lead','analyst','finance'];
            window.location.href = OPS_ROLES.includes(role)
              ? 'flowguard-operations-center.html'
              : 'index.html';
          }, 800);
        } else {
          setLoading(false);
          showAlert('error', data.error || 'Invalid email or password. Please try again.');
        }
      } catch (err) {
        console.error('Login error:', err);
        setLoading(false);
        showAlert('error', 'Connection failed. Please check your internet and try again.');
      }
    });
  </script>
