<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="flowguard-logo.svg">
    <title>Sign Up - Flow Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        /* Flow Guard Brand Colors */
        :root {
            --primary: #2a7096;
            --primary-dark: #1b5e8c;
            --primary-light: #4c84a5;
            --accent: #2c9aa3;
            --accent-light: #74bcc2;
            --teal: #9acfd3;
            --blue-gray: #78a0bb;
            --light-blue: #a7c1d3;
            --bg-light: #e6f3f4;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--accent) 100%);
            min-height: 100vh;
        }
        
        .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(42, 112, 150, 0.3);
            border-color: var(--accent) !important;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(42, 112, 150, 0.4);
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .plan-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .plan-card:hover {
            transform: translateY(-4px);
        }
        
        .plan-card.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(42, 112, 150, 0.1) 0%, rgba(44, 154, 163, 0.1) 100%);
        }
        
        .text-brand {
            color: var(--primary);
        }
        
        .text-brand-light {
            color: var(--accent-light);
        }
        
        .bg-brand {
            background-color: var(--primary);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-12">
    
    <div class="w-full max-w-2xl">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-2xl mb-6 floating">
                <svg class="w-10 h-10 text-[#2a7096]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold font-space text-white mb-2">Join Flow Guard</h1>
            <p class="text-[#9acfd3]">Start protecting your property from flooding today</p>
        </div>
        
        <!-- Signup Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-8">
            
            <!-- Progress Steps -->
            <div class="mb-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="flex items-center justify-center w-8 h-8 rounded-full bg-[#2a7096] text-white text-sm font-bold">1</div>
                        <span class="ml-2 text-sm font-semibold text-gray-700">Account</span>
                    </div>
                    <div class="flex-1 h-1 mx-4 bg-gray-200"></div>
                    <div class="flex items-center">
                        <div class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold">2</div>
                        <span class="ml-2 text-sm font-semibold text-gray-500">Plan</span>
                    </div>
                    <div class="flex-1 h-1 mx-4 bg-gray-200"></div>
                    <div class="flex items-center">
                        <div class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold">3</div>
                        <span class="ml-2 text-sm font-semibold text-gray-500">Details</span>
                    </div>
                </div>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Create Your Account</h2>
            <p class="text-gray-600 mb-8">Fill in your details to get started</p>
            
            <!-- Signup Form -->
            <form id="signup-form" class="space-y-6">
                
                <!-- Name Fields -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
                        <input 
                            type="text" 
                            id="first-name"
                            required
                            placeholder="John"
                            class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Last Name</label>
                        <input 
                            type="text" 
                            id="last-name"
                            required
                            placeholder="Doe"
                            class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                        />
                    </div>
                </div>
                
                <!-- Email Field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input 
                        type="email" 
                        id="email"
                        required
                        placeholder="you@company.com"
                        class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                    />
                </div>
                
                <!-- Phone Field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
                    <input 
                        type="tel" 
                        id="phone"
                        required
                        placeholder="+234-803-555-0100"
                        class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                    />
                </div>
                
                <!-- Company/Estate Field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Estate/Company Name</label>
                    <input 
                        type="text" 
                        id="company"
                        required
                        placeholder="Your Estate Management Company"
                        class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                    />
                </div>
                
                <!-- Password Fields -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                        <input 
                            type="password" 
                            id="password"
                            required
                            placeholder="Min. 8 characters"
                            class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirm-password"
                            required
                            placeholder="Re-enter password"
                            class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none"
                        />
                    </div>
                </div>
                
                <!-- Terms & Conditions -->
                <div class="flex items-start">
                    <input type="checkbox" id="terms" required class="w-4 h-4 mt-1 text-[#2a7096] border-gray-300 rounded focus:ring-[#2c9aa3]">
                    <label for="terms" class="ml-2 text-sm text-gray-600">
                        I agree to the <a href="#" class="text-[#2a7096] hover:text-[#1b5e8c] font-semibold">Terms of Service</a> and 
                        <a href="#" class="text-[#2a7096] hover:text-[#1b5e8c] font-semibold">Privacy Policy</a>
                    </label>
                </div>
                
                <!-- Marketing Consent -->
                <div class="flex items-start">
                    <input type="checkbox" id="marketing" class="w-4 h-4 mt-1 text-[#2a7096] border-gray-300 rounded focus:ring-[#2c9aa3]">
                    <label for="marketing" class="ml-2 text-sm text-gray-600">
                        Send me updates about Flow Guard products and services
                    </label>
                </div>
                
                <!-- Signup Button -->
                <button 
                    type="submit"
                    class="btn-primary w-full py-3 px-6 text-white font-bold rounded-xl"
                >
                    Create Account
                </button>
                
                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500">Or sign up with</span>
                    </div>
                </div>
                
                <!-- Social Signup -->
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" class="flex items-center justify-center px-4 py-3 border-2 border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="flex items-center justify-center px-4 py-3 border-2 border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.955 4.45z"/>
                        </svg>
                        Apple
                    </button>
                </div>
                
            </form>
            
            <!-- Login Link -->
            <p class="text-center text-sm text-gray-600 mt-8">
                Already have an account? 
                <a href="login.html" class="text-[#2a7096] hover:text-[#1b5e8c] font-bold">Sign in</a>
            </p>
        </div>
        
        <!-- Footer Links -->
        <div class="text-center mt-8">
            <div class="flex items-center justify-center space-x-6 text-sm text-[#9acfd3]">
                <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
                <span>•</span>
                <a href="#" class="hover:text-white transition-colors">Terms of Service</a>
                <span>•</span>
                <a href="#" class="hover:text-white transition-colors">Support</a>
            </div>
        </div>
        
    </div>
    
    <script>
        // Handle signup form submission
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('first-name').value;
            const lastName = document.getElementById('last-name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const company = document.getElementById('company').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Validate password strength
            if (password.length < 8) {
                alert('Password must be at least 8 characters long');
                return;
            }
            
            // For demo purposes - you'll integrate with your backend API later
            console.log('Signup attempt:', { firstName, lastName, email, phone, company });
            
            // Show loading state
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="flex items-center justify-center"><svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Creating account...</span>';
            submitBtn.disabled = true;
            
            // Simulate API call
            setTimeout(() => {
                // Demo: Show success message and redirect
                alert('Account created successfully! Welcome to Flow Guard.');
                window.location.href = 'flowguard-client-portal.html';
            }, 1500);
        });
    </script>
    
</body>
</html>
