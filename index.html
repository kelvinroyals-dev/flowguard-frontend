<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowGuard — Client Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FlowGuard Client Portal — Direction B "Live Monitoring"
   Single design-token source of truth. Light default, dark via [data-theme=dark].
   ============================================================ */
:root{
  --bg:#eef2f4; --surface:#ffffff; --surface-2:#f7fafb; --line:#e2e9ed; --line-2:#d3dde2;
  --ink:#12222b; --ink-2:#4a626d; --ink-3:#8399a4;
  --brand:#0891b2; --brand-2:#06b6d4; --brand-deep:#0e5b6e; --brand-soft:#e0f5fa;
  --ok:#10b981; --ok-bg:#e6f7f1; --warn:#f59e0b; --warn-bg:#fef4e2; --alert:#ef4444; --alert-bg:#fdeceb;
  --r:20px; --rs:13px; --rx:9px;
  --sh:0 2px 4px rgba(18,34,43,.03), 0 12px 32px rgba(18,34,43,.06);
  --sh-sm:0 1px 2px rgba(18,34,43,.05);
  --ff:'Inter',sans-serif; --ff-d:'Space Grotesk',sans-serif;
}
[data-theme="dark"]{
  --bg:#0c1418; --surface:#131e24; --surface-2:#0f181d; --line:#20303a; --line-2:#2a3d47;
  --ink:#e8f0f3; --ink-2:#9fb4bf; --ink-3:#6b8492;
  --brand-soft:#0d2b33;
  --ok-bg:#0e2b22; --warn-bg:#2e2410; --alert-bg:#2e1613;
  --sh:0 2px 4px rgba(0,0,0,.2), 0 12px 32px rgba(0,0,0,.3);
  --sh-sm:0 1px 2px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ff);-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:inherit}
.hidden{display:none!important}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:76px 1fr;min-height:100vh}
.rail{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:22px 0;gap:6px;position:sticky;top:0;height:100vh}
.rail .logo{width:40px;height:40px;margin-bottom:14px}
.rail .navbtn{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;color:var(--ink-3);transition:.15s;cursor:pointer;border:none;background:none;position:relative}
.rail .navbtn svg{width:21px;height:21px}
.rail .navbtn:hover{background:var(--bg);color:var(--ink)}
.rail .navbtn.on{background:var(--brand);color:#fff}
.rail .navbtn .tip{position:absolute;left:56px;top:50%;transform:translateY(-50%);background:var(--ink);color:var(--surface);font-size:12px;font-weight:500;padding:5px 9px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;z-index:20}
.rail .navbtn:hover .tip{opacity:1}
.rail .spacer{margin-top:auto}
.rail .me{width:40px;height:40px;border-radius:50%;background:var(--brand-deep);color:#fff;display:grid;place-items:center;font-family:var(--ff-d);font-weight:600;font-size:14px;cursor:pointer;border:none}

.main{padding:30px 40px 60px;max-width:1180px;width:100%}

/* ---------- Top bar ---------- */
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;gap:16px}
.top h1{font-family:var(--ff-d);font-size:26px;font-weight:600;letter-spacing:-.02em}
.top .sub{color:var(--ink-3);font-size:13.5px;margin-top:2px}
.top-actions{display:flex;align-items:center;gap:10px}
.btn{padding:11px 20px;border-radius:100px;background:var(--brand);color:#fff;border:none;font-family:var(--ff-d);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{background:var(--brand-deep)}
.btn.ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line-2)}
.btn.ghost:hover{background:var(--bg)}
.icon-btn{width:42px;height:42px;border-radius:50%;background:var(--surface);border:1px solid var(--line-2);display:grid;place-items:center;color:var(--ink-2);cursor:pointer;position:relative}
.icon-btn svg{width:19px;height:19px}
.icon-btn .badge{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;border-radius:100px;background:var(--alert);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px}

/* ---------- Cards / panels ---------- */
.card,.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.section-t{font-family:var(--ff-d);font-size:16px;font-weight:600;margin:26px 0 14px;display:flex;align-items:center;justify-content:space-between}
.section-t a{color:var(--brand);font-size:13px;font-weight:500;text-decoration:none}

/* chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600}
.chip.ok{background:var(--ok-bg);color:var(--ok)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}
.chip.alert{background:var(--alert-bg);color:var(--alert)}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ---------- Toast ---------- */
#toasts{position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--line-2);border-left:3px solid var(--brand);border-radius:var(--rs);padding:13px 18px;box-shadow:var(--sh);font-size:13.5px;font-weight:500;min-width:240px;animation:slidein .2s ease}
.toast.ok{border-left-color:var(--ok)} .toast.error{border-left-color:var(--alert)} .toast.info{border-left-color:var(--brand)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}}

/* ---------- Loading / empty / error states ---------- */
.state{padding:50px 30px;text-align:center;color:var(--ink-3)}
.state .ic{width:52px;height:52px;border-radius:16px;background:var(--bg);display:grid;place-items:center;margin:0 auto 16px}
.state .ic svg{width:26px;height:26px;color:var(--ink-3)}
.state b{display:block;font-family:var(--ff-d);font-size:16px;color:var(--ink);margin-bottom:6px}
.state p{font-size:13.5px;max-width:340px;margin:0 auto 16px}
.skel{background:linear-gradient(90deg,var(--bg) 25%,var(--surface-2) 50%,var(--bg) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:8px}
@keyframes shim{to{background-position:-200% 0}}

/* ---------- Demo banner ---------- */
.demo-banner{display:flex;align-items:center;gap:12px;background:var(--warn-bg);border:1px solid var(--warn);border-radius:var(--rs);padding:11px 16px;margin-bottom:18px;font-size:13px}
.demo-banner svg{width:18px;height:18px;color:var(--warn);flex-shrink:0}
.demo-banner b{color:var(--ink)} .demo-banner span{color:var(--ink-2)}
.demo-banner button{margin-left:auto;background:none;border:none;color:var(--warn);font-weight:600;font-size:13px;cursor:pointer;text-decoration:underline}

/* ---------- Gauge (signature) ---------- */
.hero{display:grid;grid-template-columns:280px 1fr;gap:32px;padding:32px;margin-bottom:20px;align-items:center}
.gauge{position:relative;width:220px;height:220px;margin:0 auto}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px}
.gauge-center b{font-family:var(--ff-d);font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1}
.gauge-center small{color:var(--ink-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.gauge-center .lvl{font-size:14px;font-weight:600;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.lvl-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* Greeting header */
.greeting{margin-bottom:22px}
.greeting h1{font-family:var(--ff-d);font-size:28px;font-weight:600;letter-spacing:-.02em}
.greeting .sub{color:var(--ink-3);font-size:14px;margin-top:4px}

/* Journey hero — adapts per stage */
.journey{display:flex;align-items:center;gap:20px;padding:22px 26px;border-radius:var(--r);margin-bottom:20px;position:relative;overflow:hidden}
.journey.stage-active{background:linear-gradient(120deg,var(--brand-deep),var(--brand))}
.journey.stage-progress{background:linear-gradient(120deg,#155e6e,#1f8ba3)}
.journey.stage-pending{background:var(--surface);border:1px solid var(--line)}
.journey .jic{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;flex-shrink:0}
.journey.stage-active .jic,.journey.stage-progress .jic{background:rgba(255,255,255,.18)}
.journey.stage-pending .jic{background:var(--brand-soft)}
.journey .jic svg{width:28px;height:28px}
.journey.stage-active .jic svg,.journey.stage-progress .jic svg{color:#fff}
.journey.stage-pending .jic svg{color:var(--brand)}
.journey .jtext{flex:1}
.journey.stage-active .jtext b,.journey.stage-progress .jtext b{color:#fff}
.journey .jtext b{font-family:var(--ff-d);font-size:19px;font-weight:600;display:block;margin-bottom:3px}
.journey.stage-active .jtext small,.journey.stage-progress .jtext small{color:rgba(255,255,255,.85)}
.journey .jtext small{color:var(--ink-2);font-size:13.5px}
.journey .jcta{flex-shrink:0}
.journey .jcta button{background:rgba(255,255,255,.2);color:#fff;border:none;padding:10px 18px;border-radius:100px;font-family:var(--ff-d);font-weight:600;font-size:13.5px;cursor:pointer}
.journey.stage-pending .jcta button{background:var(--brand);color:#fff}

/* denser KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-c{background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:16px 18px;box-shadow:var(--sh-sm)}
.kpi-c .kl{color:var(--ink-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi-c .kl svg{width:13px;height:13px}
.kpi-c .kn{font-family:var(--ff-d);font-size:23px;font-weight:700;letter-spacing:-.02em}
.kpi-c .ks{font-size:11.5px;color:var(--ink-3);margin-top:2px}

/* monitoring section wrapper */
.mon-wrap{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:28px;box-shadow:var(--sh);margin-bottom:8px}

/* report/document rows */
.doc{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.doc:last-child{border:none}
.doc .dic{width:40px;height:40px;border-radius:11px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex-shrink:0}
.doc .dic svg{width:19px;height:19px}
.doc .dmain b{font-size:14px;font-weight:600;display:block}
.doc .dmain small{color:var(--ink-3);font-size:12.5px}
.doc .dl{margin-left:auto}
.doc .dl a{color:var(--brand);font-size:13px;font-weight:600;text-decoration:none}

@media(max-width:900px){.mon-wrap{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}}
.hero-info h2{font-family:var(--ff-d);font-size:22px;font-weight:600;margin-bottom:8px}
.hero-info p{color:var(--ink-2);font-size:14.5px;max-width:420px;margin-bottom:20px}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap}
.hero-stats .s{background:var(--bg);border-radius:var(--rs);padding:13px 17px;flex:1;min-width:120px}
.hero-stats .s small{display:block;color:var(--ink-3);font-size:11.5px;font-weight:600;margin-bottom:5px}
.hero-stats .s b{font-family:var(--ff-d);font-size:19px;font-weight:600}
.hero-stats .s .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:6px}

/* ---------- Sensor cards ---------- */
.sensors{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.sensor{background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:18px;box-shadow:var(--sh)}
.sensor .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sensor .nm{font-size:13px;font-weight:600;color:var(--ink-2)}
.live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ok)}
.live.off{color:var(--ink-3)}
.live .d{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.3}}
.sensor .v{font-family:var(--ff-d);font-size:26px;font-weight:700;letter-spacing:-.02em}
.sensor .v .u2{font-size:15px;color:var(--ink-3)}
.sensor .u{color:var(--ink-3);font-size:12px;margin-top:2px}
.spark{display:flex;align-items:flex-end;gap:3px;height:34px;margin-top:12px}
.spark i{flex:1;background:var(--brand-soft);border-radius:3px;min-height:4px}
.sensor-metrics{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.sensor-metrics .sm{display:flex;flex-direction:column;gap:2px}
.sensor-metrics .sm-l{color:var(--ink-3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sensor-metrics .sm-v{font-family:var(--ff-d);font-size:14px;font-weight:600}

/* ---------- Stat tiles ---------- */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:8px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.statcard{padding:20px}
.statcard .lbl{color:var(--ink-3);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.statcard .num{font-family:var(--ff-d);font-size:28px;font-weight:700;letter-spacing:-.02em}
.statcard .sub{color:var(--ink-3);font-size:12.5px;margin-top:4px}
.statcard .chip{margin-top:12px}

/* ---------- Two-column ---------- */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
.cols.wide{grid-template-columns:1.4fr 1fr}
.panel-pad{padding:24px}
.panel-pad h3{font-family:var(--ff-d);font-size:15px;font-weight:600;margin-bottom:18px}

/* timeline / activity rows */
.evt{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
.evt:last-child{border:none}
.evt .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.evt .ic svg{width:17px;height:17px}
.evt.ok .ic{background:var(--ok-bg);color:var(--ok)}
.evt.warn .ic{background:var(--warn-bg);color:var(--warn)}
.evt.alert .ic{background:var(--alert-bg);color:var(--alert)}
.evt b{font-size:13.5px;font-weight:600;display:block}
.evt small{color:var(--ink-3);font-size:12px}
.evt .t{margin-left:auto;color:var(--ink-3);font-size:11.5px;white-space:nowrap}

/* table rows (billing/properties) */
.rows{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}
.row:last-child{border:none}
.row .rmain b{font-size:14px;font-weight:600;display:block}
.row .rmain small{color:var(--ink-3);font-size:12.5px}
.row .rright{margin-left:auto;text-align:right}
.row .amt{font-family:var(--ff-d);font-size:15px;font-weight:600}

/* forms */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink-2)}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);background:var(--surface)}
.field .hint{color:var(--ink-3);font-size:12px;margin-top:5px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(12,20,24,.5);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:80;padding:20px}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);width:100%;max-width:520px;max-height:90vh;overflow:auto}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:22px 26px;border-bottom:1px solid var(--line)}
.modal-h h2{font-family:var(--ff-d);font-size:19px;font-weight:600}
.modal-h button{background:none;border:none;cursor:pointer;color:var(--ink-3);font-size:22px;line-height:1}
.modal-b{padding:26px}
.modal-f{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

@media(max-width:900px){
  .hero{grid-template-columns:1fr}.sensors{grid-template-columns:1fr 1fr}
  .grid-3,.grid-4,.cols,.cols.wide{grid-template-columns:1fr}
  .app{grid-template-columns:1fr}
  .rail{flex-direction:row;height:auto;width:100%;position:sticky;top:0;z-index:30;padding:10px 14px;gap:4px;justify-content:flex-start;overflow-x:auto}
  .rail .logo{margin:0 8px 0 0} .rail .spacer{margin:0 0 0 auto} .rail .navbtn .tip{display:none}
  .main{padding:22px 18px}
}
</style>
</head>
<body>
<div class="app">
  <!-- Rail nav -->
  <nav class="rail" id="rail">
    <img class="logo" src="flowguard-logo.svg" alt="FlowGuard">
    <button class="navbtn on" data-tab="overview"><span class="tip">Overview</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></button>
    <button class="navbtn" data-tab="monitoring"><span class="tip">Monitoring</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg></button>
    <button class="navbtn" data-tab="properties"><span class="tip">Properties</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg></button>
    <button class="navbtn" data-tab="billing"><span class="tip">Billing</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></button>
    <button class="navbtn" data-tab="reports"><span class="tip">Reports</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></button>
    <button class="navbtn" data-tab="alerts"><span class="tip">Alerts</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></button>
    <button class="navbtn" data-tab="support"><span class="tip">Support</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
    <span class="spacer"></span>
    <button class="navbtn" id="themeBtn"><span class="tip">Theme</span><span id="themeIcon"></span></button>
    <button class="me" data-tab="account" id="meBtn">--</button>
  </nav>

  <!-- Main content — screens render here -->
  <main class="main" id="view"></main>
</div>

<div id="toasts"></div>

<!-- Contract layer (unchanged) -->
<script src="js/api-client.js"></script>
<script src="js/auth.js"></script>
<!-- Portal v2 -->
<script src="js/ui.js"></script>
<script src="js/demo.js"></script>
<script src="js/screens.js"></script>
<script src="js/app.js"></script>
</body>
</html>
