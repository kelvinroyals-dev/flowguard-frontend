<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowGuard — Client Portal</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FlowGuard Client Portal — Direction B "Live Monitoring"
   Single design-token source of truth. Light default, dark via [data-theme=dark].
   ============================================================ */
:root{
  --bg:#eef2f4; --surface:#ffffff; --surface-2:#f7fafb; --line:#e2e9ed; --line-2:#d3dde2;
  --ink:#12222b; --ink-2:#4a626d; --ink-3:#8399a4;
  --brand:#0891b2; --brand-2:#06b6d4; --brand-deep:#0e5b6e; --brand-soft:#e0f5fa;
  --ok:#10b981; --ok-bg:#e6f7f1; --warn:#f59e0b; --warn-bg:#fef4e2; --alert:#ef4444; --alert-bg:#fdeceb;
  --r:20px; --rs:13px; --rx:9px;
  --sh:0 2px 4px rgba(18,34,43,.03), 0 12px 32px rgba(18,34,43,.06);
  --sh-sm:0 1px 2px rgba(18,34,43,.05);
  --ff:'Inter',sans-serif; --ff-d:'Space Grotesk',sans-serif;
}
[data-theme="dark"]{
  --bg:#0c1418; --surface:#131e24; --surface-2:#0f181d; --line:#20303a; --line-2:#2a3d47;
  --ink:#e8f0f3; --ink-2:#9fb4bf; --ink-3:#6b8492;
  --brand-soft:#0d2b33;
  --ok-bg:#0e2b22; --warn-bg:#2e2410; --alert-bg:#2e1613;
  --sh:0 2px 4px rgba(0,0,0,.2), 0 12px 32px rgba(0,0,0,.3);
  --sh-sm:0 1px 2px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ff);-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:inherit}
.hidden{display:none!important}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:224px 1fr;min-height:100vh}
.rail{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 14px;gap:4px;position:sticky;top:0;height:100vh}
.rail-brand{display:flex;align-items:center;gap:10px;padding:2px 8px 20px}
.rail-brand .logo{height:32px;width:auto;max-width:44px;object-fit:contain}
.rail-brand .logo-dark{display:none}
[data-theme="dark"] .rail-brand .logo-light{display:none}
[data-theme="dark"] .rail-brand .logo-dark{display:block}
.rail-brand .brand-name{font-family:var(--ff-d);font-size:17px;font-weight:600;letter-spacing:-.01em}
.nav-group{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.nav-heading{font-size:10.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.07em;padding:12px 12px 6px}
.rail .navbtn{display:flex;align-items:center;gap:12px;width:100%;padding:9px 12px;border-radius:10px;color:var(--ink-2);transition:.13s;cursor:pointer;border:none;background:none;text-align:left;font-family:var(--ff);font-size:13.5px;font-weight:500}
.rail .navbtn svg{width:19px;height:19px;flex-shrink:0}
.rail .navbtn .navlabel{white-space:nowrap}
.rail .navbtn:hover{background:var(--bg);color:var(--ink)}
.rail .navbtn.on{background:var(--brand);color:#fff}
.rail-foot{margin-top:auto;display:flex;flex-direction:column;gap:4px;padding-top:12px;border-top:1px solid var(--line)}
.rail .theme-btn{color:var(--ink-2)}
.rail-user{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:10px;border:none;background:none;cursor:pointer;transition:.13s}
.rail-user:hover{background:var(--bg)}
.rail-user .me-av{width:32px;height:32px;border-radius:50%;background:var(--brand-deep);color:#fff;display:grid;place-items:center;font-family:var(--ff-d);font-weight:600;font-size:13px;flex-shrink:0}
.rail-user .navlabel{font-size:13.5px;font-weight:600;color:var(--ink)}
.mob-toggle{display:none}
/* settings rows + toggle switch */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.set-row:last-of-type{border-bottom:none}
.set-row b{font-size:14px;font-weight:600;display:block}
.set-row small{color:var(--ink-3);font-size:12.5px}
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--line-2);border-radius:24px;transition:.2s;cursor:pointer}
.slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .slider{background:var(--brand)}
.switch input:checked + .slider::before{transform:translateX(20px)}

.main{padding:0 40px 60px;width:100%}
.top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:11px 40px;margin:0 -40px 22px;background:var(--surface);border-bottom:1px solid var(--line);min-height:60px}

/* ---------- Top bar ---------- */
.top h1{font-family:var(--ff-d);font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
.top .sub{color:var(--ink-3);font-size:12px;margin-top:1px}
.top-actions{display:flex;align-items:center;gap:8px}
.top-actions .btn{padding:8px 16px;font-size:13px}
.btn{padding:11px 20px;border-radius:100px;background:var(--brand);color:#fff;border:none;font-family:var(--ff-d);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{background:var(--brand-deep)}
.btn.ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line-2)}
.btn.ghost:hover{background:var(--bg)}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--line-2);display:grid;place-items:center;color:var(--ink-2);cursor:pointer;position:relative}
.icon-btn svg{width:17px;height:17px}
.icon-btn .badge{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;border-radius:100px;background:var(--alert);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px}

/* ---------- Cards / panels ---------- */
.card,.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.section-t{font-family:var(--ff-d);font-size:16px;font-weight:600;margin:26px 0 14px;display:flex;align-items:center;justify-content:space-between}
.section-t a{color:var(--brand);font-size:13px;font-weight:500;text-decoration:none}

/* chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600}
.chip.ok{background:var(--ok-bg);color:var(--ok)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}
.chip.alert{background:var(--alert-bg);color:var(--alert)}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ---------- Toast ---------- */
#toasts{position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--line-2);border-left:3px solid var(--brand);border-radius:var(--rs);padding:13px 18px;box-shadow:var(--sh);font-size:13.5px;font-weight:500;min-width:240px;animation:slidein .2s ease}
.toast.ok{border-left-color:var(--ok)} .toast.error{border-left-color:var(--alert)} .toast.info{border-left-color:var(--brand)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}}

/* ---------- Loading / empty / error states ---------- */
.state{padding:50px 30px;text-align:center;color:var(--ink-3)}
.state .ic{width:52px;height:52px;border-radius:16px;background:var(--bg);display:grid;place-items:center;margin:0 auto 16px}
.state .ic svg{width:26px;height:26px;color:var(--ink-3)}
.state b{display:block;font-family:var(--ff-d);font-size:16px;color:var(--ink);margin-bottom:6px}
.state p{font-size:13.5px;max-width:340px;margin:0 auto 16px}
.skel{background:linear-gradient(90deg,var(--bg) 25%,var(--surface-2) 50%,var(--bg) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:8px}
@keyframes shim{to{background-position:-200% 0}}

/* ---------- Demo banner ---------- */
.demo-banner{display:flex;align-items:center;gap:12px;background:var(--warn-bg);border:1px solid var(--warn);border-radius:var(--rs);padding:11px 16px;margin-bottom:18px;font-size:13px}
.demo-banner svg{width:18px;height:18px;color:var(--warn);flex-shrink:0}
.demo-banner b{color:var(--ink)} .demo-banner span{color:var(--ink-2)}
.demo-banner button{margin-left:auto;background:none;border:none;color:var(--warn);font-weight:600;font-size:13px;cursor:pointer;text-decoration:underline}

/* ---------- Gauge (signature) ---------- */
.hero{display:grid;grid-template-columns:280px 1fr;gap:32px;padding:32px;margin-bottom:20px;align-items:center}
.gauge{position:relative;width:220px;height:220px;margin:0 auto}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px}
.gauge-center b{font-family:var(--ff-d);font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1}
.gauge-center small{color:var(--ink-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.gauge-center .lvl{font-size:14px;font-weight:600;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.lvl-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* Greeting header */
.greeting{margin-bottom:0}
.greeting h1{font-family:var(--ff-d);font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
.greeting .sub{color:var(--ink-3);font-size:12px;margin-top:1px}

/* Journey hero — adapts per stage */
.journey{display:flex;align-items:center;gap:20px;padding:22px 26px;border-radius:var(--r);margin-bottom:20px;position:relative;overflow:hidden}
.journey.stage-active{background:linear-gradient(120deg,var(--brand-deep),var(--brand))}
.journey.stage-progress{background:linear-gradient(120deg,#155e6e,#1f8ba3)}
.journey.stage-pending{background:var(--surface);border:1px solid var(--line)}
.journey .jic{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;flex-shrink:0}
.journey.stage-active .jic,.journey.stage-progress .jic{background:rgba(255,255,255,.18)}
.journey.stage-pending .jic{background:var(--brand-soft)}
.journey .jic svg{width:28px;height:28px}
.journey.stage-active .jic svg,.journey.stage-progress .jic svg{color:#fff}
.journey.stage-pending .jic svg{color:var(--brand)}
.journey .jtext{flex:1}
.journey.stage-active .jtext b,.journey.stage-progress .jtext b{color:#fff}
.journey .jtext b{font-family:var(--ff-d);font-size:19px;font-weight:600;display:block;margin-bottom:3px}
.journey.stage-active .jtext small,.journey.stage-progress .jtext small{color:rgba(255,255,255,.85)}
.journey .jtext small{color:var(--ink-2);font-size:13.5px}
.journey .jcta{flex-shrink:0}
.journey .jcta button{background:rgba(255,255,255,.2);color:#fff;border:none;padding:10px 18px;border-radius:100px;font-family:var(--ff-d);font-weight:600;font-size:13.5px;cursor:pointer}
.journey.stage-pending .jcta button{background:var(--brand);color:#fff}

/* denser KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-c{background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:16px 18px;box-shadow:var(--sh-sm)}
.kpi-c .kl{color:var(--ink-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi-c .kl svg{width:13px;height:13px}
.kpi-c .kn{font-family:var(--ff-d);font-size:23px;font-weight:700;letter-spacing:-.02em}
.kpi-c .ks{font-size:11.5px;color:var(--ink-3);margin-top:2px}

/* monitoring section wrapper */
.mon-wrap{display:grid;grid-template-columns:280px minmax(0,1fr);gap:24px;align-items:start;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:28px;box-shadow:var(--sh);margin-bottom:8px}
.mon-wrap > :first-child{align-self:center;justify-self:center}

/* report/document rows */
.doc{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.doc:last-child{border:none}
.doc .dic{width:40px;height:40px;border-radius:11px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex-shrink:0}
.doc .dic svg{width:19px;height:19px}
.doc .dmain b{font-size:14px;font-weight:600;display:block}
.doc .dmain small{color:var(--ink-3);font-size:12.5px}
.doc .dl{margin-left:auto}
.doc .dl a{color:var(--brand);font-size:13px;font-weight:600;text-decoration:none}

@media(max-width:900px){.mon-wrap{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}}
.hero-info h2{font-family:var(--ff-d);font-size:22px;font-weight:600;margin-bottom:8px}
.hero-info p{color:var(--ink-2);font-size:14.5px;max-width:420px;margin-bottom:20px}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap}
.hero-stats .s{background:var(--bg);border-radius:var(--rs);padding:13px 17px;flex:1;min-width:120px}
.hero-stats .s small{display:block;color:var(--ink-3);font-size:11.5px;font-weight:600;margin-bottom:5px}
.hero-stats .s b{font-family:var(--ff-d);font-size:19px;font-weight:600}
.hero-stats .s .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:6px}

/* ---------- Sensor cards ---------- */
.sensor-clickable{cursor:pointer;transition:.15s}
.sensor-clickable:hover{border-color:var(--brand);box-shadow:0 4px 16px rgba(8,145,178,.12)}
/* horizontal carousel for overview */
.sensor-carousel{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.sensor-carousel::-webkit-scrollbar{height:6px}
.sensor-carousel::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:100px}
.sensor-carousel .sensor{flex:0 0 220px;scroll-snap-align:start}
.carousel-hint{font-size:11.5px;color:var(--ink-3);margin-top:2px}
/* monitoring controls */
.mon-controls{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-2);border-radius:100px;padding:8px 16px;min-width:240px;flex:1;max-width:320px}
.search-box svg{width:16px;height:16px;color:var(--ink-3);flex-shrink:0}
.search-box input{border:none;background:none;outline:none;color:var(--ink);font-family:inherit;font-size:13.5px;width:100%}
.mon-filters{display:flex;gap:6px;flex-wrap:wrap}
/* data table */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{text-align:left;color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:8px 6px;position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line)}
.data-table tbody td{padding:10px 6px;border-top:1px solid var(--line)}
.data-table tbody tr:hover{background:var(--surface-2)}
/* ticket thread */
.thread{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.thread-msg{max-width:80%;padding:12px 15px;border-radius:14px}
.thread-msg.mine{align-self:flex-end;background:var(--brand-soft);border-bottom-right-radius:4px}
.thread-msg.them{align-self:flex-start;background:var(--bg);border-bottom-left-radius:4px}
.thread-h{display:flex;justify-content:space-between;gap:12px;margin-bottom:4px;font-size:11.5px}
.thread-h b{font-weight:600}.thread-h span{color:var(--ink-3)}
.thread-b{font-size:13.5px;color:var(--ink);line-height:1.5}
.thread-sys{text-align:center;font-size:12px;color:var(--ink-3);padding:4px}
.reply-box{border-top:1px solid var(--line);padding-top:16px}
.reply-box textarea{width:100%;padding:11px 14px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px;margin-bottom:10px;resize:vertical}
.reply-box textarea:focus{outline:none;border-color:var(--brand)}
/* invoice detail */
.inv-line{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.inv-line:last-child{border:none}.inv-line span{color:var(--ink-3)}
/* service tiers */
.tier-list{display:flex;flex-direction:column;gap:10px}
.tier-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line-2);border-radius:var(--rs);cursor:pointer;transition:.15s}
.tier-opt:hover{border-color:var(--brand)}
.tier-opt:has(input:checked){border-color:var(--brand);background:var(--brand-soft)}
.tier-opt input{width:18px;height:18px;accent-color:var(--brand)}
.tier-info{flex:1}.tier-info b{display:block;font-size:14px;font-weight:600}.tier-info small{color:var(--ink-3);font-size:12.5px}
.tier-price{font-family:var(--ff-d);font-weight:600;font-size:14px;white-space:nowrap}
/* all sensor cards equal height regardless of enzyme */
.sensor{display:flex;flex-direction:column;min-height:300px}
.sensor .sensor-metrics{margin-top:12px}
.enzyme-none{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3);font-weight:500}
.sensors{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
/* overview compact sensor grid (3 across + more card) */
.mon-sensor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sensor-more{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border-style:dashed;color:var(--ink-3);transition:.15s}
.sensor-more:hover{border-color:var(--brand);color:var(--brand);background:var(--surface-2)}
.sensor-more .more-n{font-family:var(--ff-d);font-size:30px;font-weight:700;color:var(--brand)}
.sensor-more .more-l{font-size:12.5px;margin-top:2px}
.sensor-more .more-cta{font-size:12px;font-weight:600;color:var(--brand);margin-top:10px}
@media(max-width:1100px){.mon-sensor-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.mon-sensor-grid{grid-template-columns:1fr}}
.sensor{background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:18px;box-shadow:var(--sh)}
.sensor .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sensor .nm{font-size:13px;font-weight:600;color:var(--ink-2)}
.live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ok)}
.live.off{color:var(--ink-3)}
.live .d{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.3}}
.sensor .v{font-family:var(--ff-d);font-size:26px;font-weight:700;letter-spacing:-.02em}
.sensor .v .u2{font-size:15px;color:var(--ink-3)}
.sensor .u{color:var(--ink-3);font-size:12px;margin-top:2px}
.spark{display:flex;align-items:flex-end;gap:3px;height:34px;margin-top:12px}
.spark i{flex:1;background:var(--brand-soft);border-radius:3px;min-height:4px}
.sensor-metrics{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.sensor-metrics .sm{display:flex;flex-direction:column;gap:2px}
.sensor-metrics .sm-l{color:var(--ink-3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sensor-metrics .sm-v{font-family:var(--ff-d);font-size:14px;font-weight:600}
/* bio-enzyme cartridge block */
.bio-badge{display:inline-block;margin-left:7px;padding:1px 7px;border-radius:100px;background:var(--brand-soft);color:var(--brand);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;vertical-align:middle}
.enzyme{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.enzyme-h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.enzyme-t{font-size:10.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em;line-height:1.3;flex:1;min-width:0}
.enzyme-h .chip{flex-shrink:0;white-space:nowrap;font-size:10.5px;padding:3px 9px}
.enzyme-bar{height:7px;border-radius:100px;background:var(--bg);overflow:hidden}
.enzyme-bar span{display:block;height:100%;border-radius:100px;transition:width .3s}
.enzyme-f{display:flex;justify-content:space-between;gap:8px;margin-top:6px;font-size:11.5px;color:var(--ink-2);font-weight:500}
.enzyme-f span{white-space:nowrap}
/* refill banner */
.refill-banner{display:flex;align-items:center;gap:14px;background:var(--alert-bg);border:1px solid var(--alert);border-radius:var(--rs);padding:14px 18px;margin-bottom:16px}
.refill-banner svg{width:22px;height:22px;color:var(--alert);flex-shrink:0}
.refill-banner b{display:block;font-size:14px;color:var(--ink)}
.refill-banner span{font-size:12.5px;color:var(--ink-2)}
.refill-banner .btn{margin-left:auto;flex-shrink:0;padding:9px 16px;font-size:13px}
/* alerts summary strip */
.alert-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.alert-kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:16px 18px;box-shadow:var(--sh-sm)}
.alert-kpi .n{font-family:var(--ff-d);font-size:26px;font-weight:700}
.alert-kpi .l{font-size:11.5px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
/* SLA cards */
.sla-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sla-c{background:var(--bg);border-radius:var(--rs);padding:16px}
.sla-c .l{font-size:11.5px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.sla-c .v{font-family:var(--ff-d);font-size:22px;font-weight:700}
.sla-c .s{font-size:12px;color:var(--ink-3);margin-top:2px}
@media(max-width:900px){.alert-kpis{grid-template-columns:1fr 1fr}.sla-grid{grid-template-columns:1fr}}

/* ---------- Stat tiles ---------- */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:8px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.statcard{padding:20px}
.statcard .lbl{color:var(--ink-3);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.statcard .num{font-family:var(--ff-d);font-size:28px;font-weight:700;letter-spacing:-.02em}
.statcard .sub{color:var(--ink-3);font-size:12.5px;margin-top:4px}
.statcard .chip{margin-top:12px}

/* ---------- Two-column ---------- */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
.cols.wide{grid-template-columns:1.4fr 1fr}
.panel-pad{padding:24px}
.panel-pad h3{font-family:var(--ff-d);font-size:15px;font-weight:600;margin-bottom:18px}

/* timeline / activity rows */
.evt{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
.evt:last-child{border:none}
.evt .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.evt .ic svg{width:17px;height:17px}
.evt.ok .ic{background:var(--ok-bg);color:var(--ok)}
.evt.warn .ic{background:var(--warn-bg);color:var(--warn)}
.evt.alert .ic{background:var(--alert-bg);color:var(--alert)}
.evt b{font-size:13.5px;font-weight:600;display:block}
.evt small{color:var(--ink-3);font-size:12px}
.evt .t{margin-left:auto;color:var(--ink-3);font-size:11.5px;white-space:nowrap}

/* table rows (billing/properties) */
.rows{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}
.row:last-child{border:none}
.row .rmain b{font-size:14px;font-weight:600;display:block}
.row .rmain small{color:var(--ink-3);font-size:12.5px}
.row .rright{margin-left:auto;text-align:right}
.row .amt{font-family:var(--ff-d);font-size:15px;font-weight:600}

/* forms */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink-2)}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);background:var(--surface)}
.field .hint{color:var(--ink-3);font-size:12px;margin-top:5px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(12,20,24,.5);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:80;padding:20px}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);width:100%;max-width:520px;max-height:90vh;overflow:auto}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:22px 26px;border-bottom:1px solid var(--line)}
.modal-h h2{font-family:var(--ff-d);font-size:19px;font-weight:600}
.modal-h button{background:none;border:none;cursor:pointer;color:var(--ink-3);font-size:22px;line-height:1}
.modal-b{padding:26px}
.modal-f{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

@media(max-width:900px){
  .hero{grid-template-columns:1fr}.sensors{grid-template-columns:1fr 1fr}
  .grid-3,.grid-4,.cols,.cols.wide{grid-template-columns:1fr}
  .app{grid-template-columns:1fr}
  .rail{position:fixed;left:0;top:0;bottom:0;width:224px;z-index:40;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--sh)}
  .rail.open{transform:translateX(0)}
  .mob-toggle{display:grid;place-items:center;position:fixed;top:14px;right:14px;z-index:50;width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--line-2);color:var(--ink);cursor:pointer}
  .mob-toggle svg{width:20px;height:20px}
  .main{padding:0 18px 40px}
  .top{padding:10px 18px;margin:0 -18px 18px;min-height:54px}
}
.assigned-team{margin-top:6px}
.team-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.tm-list{display:flex;flex-direction:column;gap:10px}
.tm-row{display:flex;align-items:center;gap:11px}
.tm-av{width:34px;height:34px;border-radius:50%;background:var(--brand-soft);color:var(--brand-deep);display:grid;place-items:center;font-family:var(--ff-d);font-size:12px;font-weight:600;flex-shrink:0}
.tm-name{font-size:13.5px;font-weight:500;color:var(--ink)}
.tm-role{font-size:12px;color:var(--ink-3)}
.crumb{color:var(--ink-3);font-size:12.5px;margin-bottom:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:color .15s}
.crumb:hover{color:var(--brand)}
.rep-metric{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;min-width:120px}
.rep-metric .l{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.rep-metric .v{font-family:var(--ff-d);font-size:20px;font-weight:600}
.modal-wide{max-width:560px;width:100%}
.form-section-t{font-family:var(--ff-d);font-size:13px;font-weight:600;color:var(--ink);margin:20px 0 10px;padding-top:14px;border-top:1px solid var(--line)}
.form-section-t:first-child{margin-top:0;padding-top:0;border-top:none}
.form-section-t .opt{font-family:var(--ff-b);font-size:12px;font-weight:400;color:var(--ink-3)}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.field .req{color:var(--alert)}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;column-gap:40px;row-gap:0}
.pf-row{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:11px 0;border-bottom:1px solid var(--line)}
.pf-k{font-size:13px;color:var(--ink-3);flex-shrink:0}
.pf-v{font-size:13.5px;color:var(--ink);font-weight:500;text-align:right}
@media(max-width:600px){.profile-grid{grid-template-columns:1fr;column-gap:0}}
.sensor-offline{border-color:rgba(239,68,68,.45)!important;background:linear-gradient(180deg,rgba(239,68,68,.06),transparent)!important}
.live.off-red{color:#fca5a5;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
.live.off-red .d{background:#ef4444}
.offline-body{padding:18px 0 8px}
.offline-msg{font-size:14px;font-weight:600;color:#fca5a5}
.offline-sub{font-size:12px;color:var(--ink-3);margin-top:3px}
.sensor-ping{font-size:11px;color:var(--ink-3);margin-top:8px}
</style>
</head>
