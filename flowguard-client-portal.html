<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Guard - Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Manrope', sans-serif; }
        
        /* Dark mode */
        .dark { background: #0F1117; color: #E8ECEF; }
        .dark .bg-white { background: #1A1F2E !important; }
        .dark .text-gray-900 { color: #E8ECEF !important; }
        .dark .text-gray-700 { color: #D1D5DB !important; }
        .dark .text-gray-600 { color: #9CA3AF !important; }
        .dark .text-gray-500 { color: #6B7280 !important; }
        .dark .border-gray-200 { border-color: #374151 !important; }
        .dark .border-gray-300 { border-color: #4B5563 !important; }
        .dark input, .dark select, .dark textarea { 
            background: #1A1F2E !important; 
            border-color: #374151 !important; 
            color: #E8ECEF !important; 
        }
        .dark .modern-card { background: #1A1F2E; border-color: #2A3142; }
        
        .modern-card { 
            background: white; 
            border-radius: 12px; 
            border: 1px solid #E5E7EB;
            transition: all 0.2s;
        }
        .modern-card:hover { 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); 
            transform: translateY(-2px); 
        }
        
        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-submitted { background: #FEF3C7; color: #92400E; }
        .status-inspection_scheduled { background: #DBEAFE; color: #1E40AF; }
        .status-active { background: #D1FAE5; color: #065F46; }
        
        /* Timeline */
        .timeline-step {
            position: relative;
            padding-left: 2.5rem;
            padding-bottom: 2rem;
        }
        .timeline-step:last-child { padding-bottom: 0; }
        .timeline-step::before {
            content: '';
            position: absolute;
            left: 0.6875rem;
            top: 2rem;
            bottom: 0;
            width: 2px;
            background: #E5E7EB;
        }
        .timeline-step:last-child::before { display: none; }
        .timeline-dot {
            position: absolute;
            left: 0;
            top: 0.375rem;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .timeline-dot.completed { background: #10B981; }
        .timeline-dot.current { background: #3B82F6; animation: pulse 2s infinite; }
        .timeline-dot.pending { background: #E5E7EB; }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .tab-item {
            padding: 12px 20px;
            font-weight: 600;
            font-size: 14px;
            color: #6B7280;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-item:hover { color: #2a7096; }
        .tab-item.active { 
            color: #2a7096; 
            border-bottom-color: #2a7096; 
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">

                    </svg>

                    <div id="demo-toggle-container" class="hidden items-center gap-2 bg-gray-100 px-3 py-2 rounded-lg">
                        <span class="text-sm font-medium text-gray-700">Demo</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="demo-toggle" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#2c9aa3]"></div>

                    <div class="relative">
                        <button id="user-menu-btn" class="flex items-center gap-3 bg-gray-100 px-3 py-2 rounded-lg hover:bg-gray-200">
                            <div class="w-8 h-8 bg-gradient-to-br from-[#2a7096] to-[#2c9aa3] rounded-full flex items-center justify-center text-white font-bold text-sm" id="user-initials">U</div>
                            <div class="text-left hidden sm:block">
                                <div class="text-sm font-semibold text-gray-900" id="user-name">User</div>
                                <div class="text-xs text-gray-500">Client</div>
                            </div>
                            <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-2">
                            <div class="px-4 py-3 border-b border-gray-100">
                                <p class="text-sm font-semibold text-gray-900" id="dropdown-name">User Name</p>
                                <p class="text-xs text-gray-500" id="dropdown-email">user@email.com</p>
                            </div>
                            <a href="#" id="account-settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    Account Settings
                                </div>
                            </a>
                            <a href="#" id="notifications-link" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                                    </svg>
                                    Notifications

                                </div>
                            </a>
                            <hr class="my-2">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                                    </svg>
                                    Sign Out
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Tabs (for existing customers) -->
    <div id="tabs-container" class="hidden bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex gap-8">
                <button class="tab-item active" data-tab="dashboard">Dashboard</button>
                <button class="tab-item" data-tab="assets">My Assets</button>
                <button class="tab-item" data-tab="alerts">Alerts</button>
                <button class="tab-item" data-tab="billing">Billing</button>
                <button class="tab-item" data-tab="support">Support</button>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="welcome-section" class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900" id="greeting">Welcome back!</h2>
            <p class="text-gray-600 mt-1" id="subtitle">Here's what's happening with your properties</p>
        </div>
        
        <div id="loading" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="skeleton h-32 rounded-xl"></div>
            <div class="skeleton h-32 rounded-xl"></div>
            <div class="skeleton h-32 rounded-xl"></div>
        </div>
        
        <div id="main-content" class="hidden"></div>
    </main>

    <script>
        const API_BASE = 'https://api.flowguard.ng/api/v1';
        let user = null;
        let properties = [];
        let preferences = null;
        let demoMode = false;
        
        // Auth check
        function checkAuth() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            if (!token || !userStr) {
                window.location.href = 'login.html';
                return false;
            }
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return false;
                }
                user = JSON.parse(userStr);
                updateUI();
                return true;
            } catch(e) {
                window.location.href = 'login.html';
                return false;
            }
        }
        
        function updateUI() {
            const firstName = user.fullName?.split(' ')[0] || 'User';
            const initials = user.fullName?.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() || 'U';
            document.getElementById('user-name').textContent = firstName;
            document.getElementById('user-initials').textContent = initials;
            document.getElementById('dropdown-name').textContent = user.fullName || 'User';
            document.getElementById('dropdown-email').textContent = user.email || '';
            
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
            document.getElementById('greeting').textContent = `${greeting}, ${firstName}!`;
        }
        
        // Event listeners
        document.getElementById('user-menu-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        
        document.addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.add('hidden');
        });
        
        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm('Sign out?')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        });
        
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
        
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        
        document.getElementById('demo-toggle').addEventListener('change', async (e) => {
            demoMode = e.target.checked;
            const token = localStorage.getItem('token');
            try {
                await fetch(`${API_BASE}/preferences`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ showDemoData: demoMode })
                });
            } catch(err) {}
            render();
        });
        
        document.getElementById('account-settings').addEventListener('click', (e) => {
            e.preventDefault();
            showAccountSettings();
        });
        
        document.getElementById('notifications-link').addEventListener('click', (e) => {
            e.preventDefault();
            showNotifications();
        });
        
        // Load data
        async function loadData() {
            const token = localStorage.getItem('token');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            
            try {
                const [prefRes, propRes] = await Promise.all([
                    fetch(`${API_BASE}/preferences`, { headers: { 'Authorization': `Bearer ${token}` }}),
                    fetch(`${API_BASE}/properties`, { headers: { 'Authorization': `Bearer ${token}` }})
                ]);
                
                if (prefRes.ok) {
                    const data = await prefRes.json();
                    preferences = data.data;
                    demoMode = preferences.show_demo_data || false;
                    document.getElementById('demo-toggle').checked = demoMode;
                }
                
                if (propRes.ok) {
                    const data = await propRes.json();
                    properties = data.data || [];
                }
            } catch(err) {
                console.error('Load error:', err);
            }
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            render();
        }
        
        function render() {
            if (properties.length === 0) {
                document.getElementById('demo-toggle-container').classList.remove('hidden');
                document.getElementById('demo-toggle-container').classList.add('flex');
                document.getElementById('subtitle').textContent = demoMode ? 'Exploring demo estate' : 'Let\'s protect your estate from drainage issues';
            } else {
                document.getElementById('demo-toggle-container').classList.add('hidden');
                document.getElementById('subtitle').textContent = 'Here\'s what\'s happening with your properties';
            }
            
            if (demoMode) {
                renderDemo();
            } else if (properties.length === 0) {
                renderRegistration();
            } else {
                renderDashboard(properties[0]);
            }
        }
        
        function renderRegistration() {
            document.getElementById('tabs-container').classList.add('hidden');
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-[#2a7096] to-[#2c9aa3] rounded-full mb-4">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2-2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-900 mb-2">Register Your Property</h2>
                        <p class="text-gray-600">Let's protect your estate from drainage issues</p>
                    </div>
                    
                    <div class="mb-8">
                        <div class="flex items-center justify-center">
                            <div class="flex items-center gap-4">
                                <div class="flex items-center">
                                    <div class="flex items-center justify-center w-10 h-10 rounded-full bg-[#2a7096] text-white font-bold step-ind" data-step="1">1</div>
                                    <span class="ml-2 font-medium text-gray-900 step-label">Property Details</span>
                                </div>
                                <div class="w-16 h-1 bg-gray-300 step-line"></div>
                                <div class="flex items-center">
                                    <div class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-300 text-gray-600 font-bold step-ind" data-step="2">2</div>
                                    <span class="ml-2 font-medium text-gray-500 step-label">Issues</span>
                                </div>
                                <div class="w-16 h-1 bg-gray-300 step-line"></div>
                                <div class="flex items-center">
                                    <div class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-300 text-gray-600 font-bold step-ind" data-step="3">3</div>
                                    <span class="ml-2 font-medium text-gray-500 step-label">Inspection</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modern-card shadow-xl p-8">
                        <form id="property-form">
                            <div class="form-step" data-step="1">
                                <h3 class="text-xl font-bold text-gray-900 mb-6">Property Information</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Property Name *</label>
                                        <input type="text" name="propertyName" required placeholder="e.g., Lekki Gardens Phase 1"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Property Type *</label>
                                        <select name="propertyType" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                            <option value="">Select type...</option>
                                            <option value="residential_estate">Residential Estate</option>
                                            <option value="commercial_complex">Commercial Complex</option>
                                            <option value="industrial_park">Industrial Park</option>
                                            <option value="mixed_use">Mixed Use</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Total Area (sqm)</label>
                                        <input type="number" name="totalAreaSqm" placeholder="e.g., 50000"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Address *</label>
                                        <input type="text" name="addressLine1" required placeholder="Street address"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none mb-3 bg-white">
                                        <input type="text" name="addressLine2" placeholder="Apt, suite (optional)"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">City *</label>
                                        <input type="text" name="city" required value="Lagos"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">State *</label>
                                        <input type="text" name="state" required value="Lagos"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Number of Units</label>
                                        <input type="number" name="numberOfUnits" placeholder="e.g., 120"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Number of Buildings</label>
                                        <input type="number" name="numberOfBuildings" placeholder="e.g., 15"
                                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none bg-white">
                                    </div>
                                </div>
                                <div class="flex justify-end mt-8">
                                    <button type="button" onclick="nextStep(2)" class="px-8 py-3 bg-gradient-to-r from-[#2a7096] to-[#2c9aa3] text-white font-bold rounded-xl hover:shadow-lg">
                                        Next Step →
                                    </button>
                                </div>
                            </div>
                            
                            <div class="form-step hidden" data-step="2">
                                <h3 class="text-xl font-bold text-gray-900 mb-6">Current Drainage Issues</h3>
                                <div class="mb-6">
                                    <label class="block text-sm font-semibold text-gray-700 mb-4">What problems are you experiencing?</label>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <label class="flex items-center p-4 border-2 border-gray-200 bg-white rounded-xl cursor-pointer hover:border-[#2c9aa3]">
                                            <input type="checkbox" name="issue_flooding" value="true" class="w-5 h-5 text-[#2c9aa3] rounded">
                                            <span class="ml-3 font-medium text-gray-900">Flooding</span>
                                        </label>
                                        <label class="flex items-center p-4 border-2 border-gray-200 bg-white rounded-xl cursor-pointer hover:border-[#2c9aa3]">
                                            <input type="checkbox" name="issue_blockage" value="true" class="w-5 h-5 text-[#2c9aa3] rounded">
                                            <span class="ml-3 font-medium text-gray-900">Blockage</span>

        function nextStep(step) {
            document.querySelectorAll('.form-step').forEach(s => s.classList.add('hidden'));
            document.querySelector(`.form-step[data-step="${step}"]`).classList.remove('hidden');
            
            document.querySelectorAll('.step-ind').forEach((ind, i) => {
                const num = i + 1;
                if (num < step) {
                    ind.className = 'flex items-center justify-center w-10 h-10 rounded-full bg-green-500 text-white font-bold step-ind';
                } else if (num === step) {
                    ind.className = 'flex items-center justify-center w-10 h-10 rounded-full bg-[#2a7096] text-white font-bold step-ind';
                } else {
                    ind.className = 'flex items-center justify-center w-10 h-10 rounded-full bg-gray-300 text-gray-600 font-bold step-ind';
                }
            });
            
            document.querySelectorAll('.step-line').forEach((line, i) => {
                if (i + 1 < step) {
                    line.className = 'w-16 h-1 bg-green-500 step-line';
                } else {
                    line.className = 'w-16 h-1 bg-gray-300 step-line';
                }
            });
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const issues = {};
            ['flooding', 'blockage', 'overflow', 'slowDrainage', 'odor', 'structural'].forEach(i => {
                if (data.get(`issue_${i}`)) issues[i] = true;
            });
            
            const payload = {
                propertyName: data.get('propertyName'),
                propertyType: data.get('propertyType'),
                addressLine1: data.get('addressLine1'),
                addressLine2: data.get('addressLine2'),
                city: data.get('city'),
                state: data.get('state'),
                totalAreaSqm: parseInt(data.get('totalAreaSqm')) || null,
                numberOfUnits: parseInt(data.get('numberOfUnits')) || null,
                numberOfBuildings: parseInt(data.get('numberOfBuildings')) || null,
                currentIssues: issues,
                issueDescription: data.get('issueDescription'),
                contactPersonName: data.get('contactPersonName'),
                contactPersonRole: data.get('contactPersonRole'),
                contactPhone: data.get('contactPhone'),
                contactEmail: data.get('contactEmail'),
                preferredInspectionDate: data.get('preferredInspectionDate'),
                preferredInspectionTime: data.get('preferredInspectionTime'),
                urgencyLevel: data.get('urgencyLevel')
            };
            
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_BASE}/properties`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    alert('✅ Property submitted! Our team will contact you within 24 hours.');
                    location.reload();
                } else {
                    alert('❌ Submission failed. Please try again.');
                    btn.innerHTML = 'Submit Property →';
                    btn.disabled = false;
                }
            } catch(err) {
                alert('❌ Connection error. Please try again.');
                btn.innerHTML = 'Submit Property →';
                btn.disabled = false;
            }
        }
