<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Guard - Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        /* Dark mode */
        body { background: #FAFBFC; color: #1F2937; }
        .dark body { background: #0F1117; color: #E8ECEF; }
        
        /* Force text visibility in dark mode */
        .dark .text-gray-900 { color: #E8ECEF !important; }
        .dark .text-gray-700 { color: #D1D5DB !important; }
        .dark .text-gray-600 { color: #9CA3AF !important; }
        .dark .text-gray-500 { color: #6B7280 !important; }
        
        /* Form inputs in dark mode */
        .dark input, .dark select, .dark textarea {
            background: #1A1F2E !important;
            border-color: #374151 !important;
            color: #E8ECEF !important;
        }
        
        .dark input::placeholder,
        .dark textarea::placeholder {
            color: #6B7280 !important;
        }
        
        /* Cards */
        .modern-card { 
            background: white; 
            border-radius: 12px; 
            border: 1px solid #E8ECEF;
            transition: all 0.2s ease;
        }
        
        .dark .modern-card {
            background: #1A1F2E;
            border-color: #2A3142;
        }
        
        .modern-card:hover { 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); 
            transform: translateY(-2px); 
        }
        
        .dark .modern-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        
        /* Tabs */
        .tab-item { 
            padding: 16px 24px; 
            font-weight: 600; 
            font-size: 14px;
            color: #6B7280;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-item:hover { color: #2563EB; }
        .tab-item.active { 
            color: #2563EB; 
            border-bottom-color: #2563EB; 
        }
        
        .dark .tab-item { color: #9CA3AF; }
        .dark .tab-item:hover { color: #60A5FA; }
        .dark .tab-item.active { 
            color: #60A5FA; 
            border-bottom-color: #60A5FA; 
        }
        
        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .status-submitted { background: #FEF3C7; color: #92400E; }
        .status-inspection_scheduled { background: #DBEAFE; color: #1E40AF; }
        .status-active { background: #D1FAE5; color: #065F46; }
        
        /* Timeline */
        .timeline-step {
            position: relative;
            padding-left: 2.5rem;
            padding-bottom: 2rem;
        }
        
        .timeline-step:last-child { padding-bottom: 0; }
        
        .timeline-step::before {
            content: '';
            position: absolute;
            left: 0.6875rem;
            top: 2rem;
            bottom: 0;
            width: 2px;
            background: #E5E7EB;
        }
        
        .dark .timeline-step::before { background: #374151; }
        
        .timeline-step:last-child::before { display: none; }
        
        .timeline-dot {
            position: absolute;
            left: 0;
            top: 0.375rem;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .dark .timeline-dot { border-color: #0F1117; }
        
        .timeline-dot.completed { background: #10B981; }
        .timeline-dot.current { 
            background: #3B82F6; 
            animation: pulse 2s infinite; 
        }
        .timeline-dot.pending { background: #E5E7EB; }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
        
        .hidden { display: none !important; }
        
        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    
    <!-- Header -->
    <header class="bg-white dark:bg-[#1A1F2E] sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-12">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold font-space">Flow Guard</h1>
                            <p class="text-xs text-gray-600 dark:text-gray-400">Client Portal</p>
                        </div>
                    </div>
                    
                    <nav class="hidden md:flex items-center -mb-px" id="main-nav">
                        <button id="tab-dashboard" class="tab-item active" onclick="switchTab('dashboard')">Dashboard</button>
                        <button id="tab-assets" class="tab-item" onclick="switchTab('assets')">My Assets</button>
                        <button id="tab-alerts-incidents" class="tab-item" onclick="switchTab('alerts-incidents')">Alerts</button>
                        <button id="tab-billing" class="tab-item" onclick="switchTab('billing')">Billing</button>
                        <button id="tab-support" class="tab-item" onclick="switchTab('support')">Support</button>
                    </nav>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- Demo Toggle -->
                    <div id="demo-toggle-container" class="hidden items-center gap-2 bg-gray-100 dark:bg-gray-800 px-3 py-2 rounded-lg">
                        <span class="text-sm font-medium">Demo</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="demo-toggle" class="sr-only peer" onchange="toggleDemoMode()">
                            <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    
                    <!-- Dark Mode Toggle -->
                    <button id="theme-toggle-header" onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700">
                        <svg id="theme-icon-sun" class="w-5 h-5 text-gray-600 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg id="theme-icon-moon" class="w-5 h-5 text-gray-400 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    
                    <!-- User Avatar & Dropdown -->
                    <div class="hidden md:block text-right">
                        <p id="user-name" class="text-sm font-medium">User</p>
                        <p id="user-role" class="text-xs text-gray-600 dark:text-gray-400">Client Access</p>
                    </div>
                    <div class="relative">
                        <div id="user-avatar" class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-700 rounded-full flex items-center justify-center text-white font-semibold text-sm cursor-pointer" onclick="toggleUserMenu()">
                            U
                        </div>
                        
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-56 modern-card shadow-lg py-2 z-50">
                            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                                <p id="menu-user-name" class="text-sm font-semibold">User</p>
                                <p id="menu-user-email" class="text-xs text-gray-500 dark:text-gray-400">user@email.com</p>
                            </div>
                            <div id="settings-panel" class="hidden px-4 py-6">
                                <h3 class="font-bold mb-4">Account Settings</h3>
                                <div class="space-y-4">
                                    <div>
                                        <label class="text-sm font-semibold block mb-2">Profile Settings</label>
                                        <button class="w-full text-left px-3 py-2 text-sm border rounded hover:bg-gray-50 dark:hover:bg-gray-800">Update Profile</button>
                                    </div>
                                    <div>
                                        <label class="text-sm font-semibold block mb-2">Security</label>
                                        <button class="w-full text-left px-3 py-2 text-sm border rounded hover:bg-gray-50 dark:hover:bg-gray-800">Change Password</button>
                                    </div>
                                </div>
                            </div>
                            <div id="notifications-panel" class="hidden px-4 py-6">
                                <h3 class="font-bold mb-4">Notifications</h3>
                                <div class="space-y-3">
                                    <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
                                        <p class="text-sm font-semibold">System health check completed</p>
                                        <p class="text-xs text-gray-600 dark:text-gray-400 mt-1">2 hours ago</p>
                                    </div>
                                    <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded-lg">
                                        <p class="text-sm font-semibold">Inspection scheduled</p>
                                        <p class="text-xs text-gray-600 dark:text-gray-400 mt-1">1 day ago</p>
                                    </div>
                                    <div class="p-3 bg-purple-50 dark:bg-purple-900/20 rounded-lg">
                                        <p class="text-sm font-semibold">Monthly report available</p>
                                        <p class="text-xs text-gray-600 dark:text-gray-400 mt-1">3 days ago</p>
                                    </div>
                                </div>
                            </div>
                            <button onclick="showPanel('settings')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                                Account Settings
                            </button>
                            <button onclick="showPanel('notifications')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                                </svg>
                                Notifications
                                <span class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">3</span>
                            </button>
                            <hr class="my-2">
                            <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                                </svg>
                                Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="loading-state" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="skeleton h-32 rounded-xl"></div>
            <div class="skeleton h-32 rounded-xl"></div>
            <div class="skeleton h-32 rounded-xl"></div>
        </div>
        
        <div id="content-dashboard" class="hidden"></div>
        <div id="content-assets" class="hidden"></div>
        <div id="content-alerts-incidents" class="hidden"></div>
        <div id="content-billing" class="hidden"></div>
        <div id="content-support" class="hidden"></div>
    </main>
    
    <script>
        const API_BASE = 'https://api.flowguard.ng/api/v1';
        let userProperties = [];
        let userPreferences = null;
        let demoMode = false;
        let currentPanel = null;
        
        // Auth check
        (function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                }
            } catch(e) {
                window.location.href = 'login.html';
            }
        })();
        
        function updateUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const firstName = user.fullName?.split(' ')[0] || 'User';
            const initials = user.fullName?.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || 'U';
            
            document.getElementById('user-name').textContent = firstName;
            document.getElementById('user-avatar').textContent = initials;
            document.getElementById('menu-user-name').textContent = user.fullName || 'User';
            document.getElementById('menu-user-email').textContent = user.email || '';
        }
        
        function toggleUserMenu() {
            const menu = document.getElementById('user-menu');
            menu.classList.toggle('hidden');
            if (!menu.classList.contains('hidden')) {
                currentPanel = null;
                document.getElementById('settings-panel').classList.add('hidden');
                document.getElementById('notifications-panel').classList.add('hidden');
            }
        }
        
        function showPanel(panel) {
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('notifications-panel').classList.add('hidden');
            if (currentPanel === panel) {
                currentPanel = null;
            } else {
                document.getElementById(`${panel}-panel`).classList.remove('hidden');
                currentPanel = panel;
            }
        }
        
        function logout() {
            if (confirm('Are you sure you want to sign out?')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
        
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        }
        
        async function toggleDemoMode() {
            demoMode = document.getElementById('demo-toggle').checked;
            const token = localStorage.getItem('token');
            try {
                await fetch(`${API_BASE}/preferences`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ showDemoData: demoMode })
                });
            } catch(e) {}
            render();
        }
        
        async function loadData() {
            const token = localStorage.getItem('token');
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('content-dashboard').classList.add('hidden');
            
            try {
                const [propRes, prefRes] = await Promise.all([
                    fetch(`${API_BASE}/properties`, { headers: { 'Authorization': `Bearer ${token}` }}),
                    fetch(`${API_BASE}/preferences`, { headers: { 'Authorization': `Bearer ${token}` }})
                ]);
                
                if (propRes.ok) {
                    const data = await propRes.json();
                    userProperties = data.data || [];
                }
                
                if (prefRes.ok) {
                    const data = await prefRes.json();
                    userPreferences = data.data;
                    demoMode = userPreferences.show_demo_data || false;
                    document.getElementById('demo-toggle').checked = demoMode;
                }
            } catch(err) {
                console.error('Load error:', err);
            }
            
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('content-dashboard').classList.remove('hidden');
            
            // Show/hide demo toggle
            if (userProperties.length === 0) {
                document.getElementById('demo-toggle-container').classList.remove('hidden');
                document.getElementById('demo-toggle-container').classList.add('flex');
            }
            
            render();
        }
        
        function render() {
            if (demoMode) {
                renderDemoData(document.getElementById('content-dashboard'));
            } else if (userProperties.length === 0) {
                renderPropertyRegistration(document.getElementById('content-dashboard'));
            } else {
                renderPropertyDashboard(document.getElementById('content-dashboard'), userProperties[0]);
            }
        }
        
        function switchTab(tab) {
            ['dashboard', 'assets', 'alerts-incidents', 'billing', 'support'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }
        
        window.addEventListener('load', function() {
            loadTheme();
            updateUserInfo();
            loadData();
        });
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#user-avatar') && !e.target.closest('#user-menu')) {
                document.getElementById('user-menu').classList.add('hidden');
            }
        });
    </script>
    
    <script src="js/property-registration.js"></script>
    <script src="js/property-dashboard.js"></script>
    <script src="js/demo-data.js"></script>
</body>
</html>
