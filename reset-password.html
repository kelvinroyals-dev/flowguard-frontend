<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Flow Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #1b5e8c 0%, #2c9aa3 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-2xl mb-6">
                <svg class="w-10 h-10 text-[#2a7096]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">Reset Password</h1>
            <p class="text-[#9acfd3]">Enter your new password</p>
        </div>
        
        <!-- Reset Password Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            
            <form id="reset-form" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
                    <input 
                        type="password" 
                        id="password"
                        required
                        placeholder="Min. 8 characters"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none transition-all"
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password"
                        required
                        placeholder="Re-enter password"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#2c9aa3] focus:outline-none transition-all"
                    />
                </div>
                
                <!-- Password strength indicator -->
                <div id="password-strength" class="hidden">
                    <div class="flex items-center space-x-2 text-sm">
                        <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div id="strength-bar" class="h-full transition-all duration-300"></div>
                        </div>
                        <span id="strength-text" class="text-xs font-semibold"></span>
                    </div>
                </div>
                
                <button 
                    type="submit"
                    class="w-full py-3 px-6 bg-gradient-to-r from-[#2a7096] to-[#2c9aa3] text-white font-bold rounded-xl hover:shadow-lg transition-all"
                >
                    Reset Password
                </button>
                
            </form>
            
            <p class="text-center text-sm text-gray-600 mt-6">
                Remember your password? 
                <a href="login.html" class="text-[#2a7096] hover:text-[#1b5e8c] font-bold">Sign in</a>
            </p>
        </div>
        
    </div>
    
    <script src="js/api.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            alert('Invalid reset link');
            window.location.href = 'login.html';
        }
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthIndicator = document.getElementById('password-strength');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            
            if (password.length === 0) {
                strengthIndicator.classList.add('hidden');
                return;
            }
            
            strengthIndicator.classList.remove('hidden');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            const colors = ['#EF4444', '#F59E0B', '#EAB308', '#84CC16', '#22C55E'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
            const widths = ['20%', '40%', '60%', '80%', '100%'];
            
            strengthBar.style.width = widths[strength - 1] || '0%';
            strengthBar.style.backgroundColor = colors[strength - 1] || '#EF4444';
            strengthText.textContent = labels[strength - 1] || '';
            strengthText.style.color = colors[strength - 1] || '#EF4444';
        });
        
        // Handle form submission
        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Validate password strength
            if (password.length < 8) {
                alert('Password must be at least 8 characters long');
                return;
            }
            
            // Show loading state
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="flex items-center justify-center"><svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Resetting...</span>';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('https://api.flowguard.ng/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Password reset successfully! You can now log in with your new password.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Failed to reset password');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Reset password error:', error);
                alert('Failed to reset password. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
    
</body>
</html>
