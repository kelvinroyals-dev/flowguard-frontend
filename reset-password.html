<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — FlowGuard</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
/* Portal design system — matches index.html */
:root{
  --bg:#eef2f4; --surface:#ffffff; --surface-2:#f7fafb; --line:#e2e9ed; --line-2:#d3dde2;
  --ink:#12222b; --ink-2:#4a626d; --ink-3:#8399a4;
  --brand:#0891b2; --brand-2:#06b6d4; --brand-deep:#0e5b6e; --brand-soft:#e0f5fa;
  --ok:#10b981; --ok-bg:#e6f7f1; --warn:#f59e0b; --warn-bg:#fef4e2; --alert:#ef4444; --alert-bg:#fdeceb;
  --r:20px; --rs:13px; --rx:9px;
  --sh:0 2px 4px rgba(18,34,43,.03), 0 12px 32px rgba(18,34,43,.06);
  --sh-sm:0 1px 2px rgba(18,34,43,.05);
  --ff:'Inter',sans-serif; --ff-d:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ff);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow-x:hidden}
/* subtle brand wash behind everything */
body::before{content:"";position:fixed;inset:0;background:radial-gradient(1000px 500px at 50% -10%, var(--brand-soft), transparent 70%);pointer-events:none;z-index:0}

/* flowing water design at bottom — original, untouched */
.wave-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      overflow: hidden;
      z-index: 0;
      opacity: 0.7;
    }
    .wave-strip svg {
      width: 200%; height: 100%;
      animation: wave-scroll 14s linear infinite;
    }
    @keyframes wave-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

.page-wrap{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
.brand-header{text-align:center;margin-bottom:26px}
.brand-header .logo{height:44px;width:auto;margin:0 auto 14px;display:block}
.brand-name{font-family:var(--ff-d);font-size:24px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.brand-tagline{font-size:12.5px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--brand);margin-top:4px}
/* corner logo — top-left on desktop */
.corner-logo{position:fixed;top:28px;left:32px;z-index:2;display:block}
.corner-logo img{height:38px;width:auto;display:block}
@media(max-width:640px){
  .corner-logo{position:static;text-align:center;margin:0 auto 20px}
  .corner-logo img{height:40px;margin:0 auto}
}

.card{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:32px 30px}
.card-title{font-family:var(--ff-d);font-size:22px;font-weight:600;letter-spacing:-.01em}
.card-sub{color:var(--ink-2);font-size:14px;margin:6px 0 24px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink-2)}
.field input{width:100%;padding:12px 14px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px;transition:.15s}
.field input:focus{outline:none;border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-soft)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink-3);cursor:pointer;padding:8px;display:grid;place-items:center}
.pw-toggle:hover{color:var(--brand)}
.pw-toggle svg{width:20px;height:20px}

.form-footer-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0 20px}
.remember-label{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink-2);cursor:pointer}
.remember-label input{width:16px;height:16px;accent-color:var(--brand)}
.forgot-link{color:var(--brand);font-size:13.5px;font-weight:500;text-decoration:none}
.forgot-link:hover{text-decoration:underline}

.btn-primary{width:100%;padding:13px;border-radius:100px;background:var(--brand);color:#fff;border:none;font-family:var(--ff-d);font-size:15px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover:not(:disabled){background:var(--brand-deep)}
.btn-primary:disabled{opacity:.7;cursor:default}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#alert-area{margin-top:14px}
.alert{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-radius:var(--rx);font-size:13.5px;line-height:1.4}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.alert-error{background:var(--alert-bg);color:#b42318}
.alert-success{background:var(--ok-bg);color:#087443}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--ink-3);font-size:12.5px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.social-row{display:flex;gap:10px}
.social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface);color:var(--ink-2);font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s;text-decoration:none}
.social-btn:hover{background:var(--bg);border-color:var(--brand)}
.social-btn svg,.social-btn img{width:18px;height:18px}

.signup-row{text-align:center;margin-top:22px;font-size:14px;color:var(--ink-2)}
.signup-row a{color:var(--brand);font-weight:600;text-decoration:none}
.signup-row a:hover{text-decoration:underline}

.invalid-panel{display:none;text-align:center;padding:10px 0}
.invalid-icon{width:56px;height:56px;border-radius:50%;background:var(--alert-bg);display:grid;place-items:center;margin:0 auto 16px}
.invalid-icon svg{width:26px;height:26px;color:var(--alert)}
/* reset key icon — small circular brand badge */
.card-icon{width:52px;height:52px;border-radius:50%;background:var(--brand-soft);display:grid;place-items:center;margin:0 auto 18px}
.card-icon svg{width:24px;height:24px;color:var(--brand)}
/* password requirements checklist */
.req-list{display:flex;flex-direction:column;gap:7px;margin:-4px 0 18px}
.req-item{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-3);transition:.15s}
.req-item .req-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line-2);flex-shrink:0;position:relative;transition:.15s}
.req-item.met{color:var(--ok)}
.req-item.met .req-dot{background:var(--ok);border-color:var(--ok)}
.req-item.met .req-dot::after{content:"";position:absolute;left:4px;top:1.5px;width:4px;height:7px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}
.invalid-title{font-family:var(--ff-d);font-size:20px;font-weight:600;margin-bottom:8px}
.invalid-body{color:var(--ink-2);font-size:14px;line-height:1.6;margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:12.5px;font-weight:500;margin-bottom:5px;color:var(--ink-2)}
.form-group input{width:100%;padding:11px 13px;border:1px solid var(--line-2);border-radius:var(--rx);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px}
.form-group input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px var(--brand-soft)}
.reset-form{display:none}

</style>
</head>
<body>

  <div class="wave-strip" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C120,20 240,60 360,40 C480,20 600,60 720,40 C840,20 960,60 1080,40 C1200,20 1320,60 1440,40 L1440,80 L0,80 Z" fill="#16a8d3"/>
      <path d="M0,55 C120,35 240,70 360,55 C480,35 600,70 720,55 C840,35 960,70 1080,55 C1200,35 1320,70 1440,55 L1440,80 L0,80 Z" fill="#0d7fa0" opacity="0.6"/>
    </svg>
  </div>

  <a href="login.html" class="corner-logo"><img src="fg-logo-light.png" alt="FlowGuard"></a>

  <main class="page-wrap">
    <div class="card">

      <!-- Invalid token state -->
      <div class="invalid-panel" id="invalid-panel">
        <div class="invalid-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
        </div>
        <div class="invalid-title">Invalid Reset Link</div>
        <p class="invalid-body">This password reset link is invalid or has expired. Reset links are valid for 1 hour.</p>
        <a href="login.html" class="btn-primary" style="display:inline-block;width:auto;padding:13px 32px;text-decoration:none;">
          Back to Login
        </a>
      </div>

      <!-- Reset form -->
      <div id="reset-form-wrap">
        <div class="card-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
        <div class="card-title">Set New Password</div>
        <div class="card-sub">Choose a strong password to secure your FlowGuard portal account.</div>

        <form id="reset-form" novalidate>

          <div class="form-group">
            <label for="password">New Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required/>
              <button type="button" class="pw-toggle" id="pw-toggle-1">
                <svg id="eye1-show" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg id="eye1-hide" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <div class="strength-wrap" id="strength-wrap" style="display:none">
              <div class="strength-track"><div class="strength-bar" id="strength-bar"></div></div>
              <span class="strength-label" id="strength-text"></span>
            </div>
            <div class="req-list" id="req-list">
              <div class="req-item" id="req-len"><div class="req-dot"></div>8+ characters</div>
              <div class="req-item" id="req-upper"><div class="req-dot"></div>Uppercase letter</div>
              <div class="req-item" id="req-lower"><div class="req-dot"></div>Lowercase letter</div>
              <div class="req-item" id="req-num"><div class="req-dot"></div>Number</div>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm New Password</label>
            <div class="pw-wrap">
              <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password" required/>
              <button type="button" class="pw-toggle" id="pw-toggle-2">
                <svg id="eye2-show" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg id="eye2-hide" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
          </div>

          <div id="alert-area"></div>

          <button type="submit" class="btn-primary" id="submit-btn">
            <span class="btn-inner" id="btn-content">Set New Password</span>
          </button>

        </form>

        <a href="login.html" class="back-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          Back to login
        </a>
      </div>

    </div>
  </main>

<script>
    // ── Token guard ──
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('reset-form-wrap').style.display = 'none';
      document.getElementById('invalid-panel').style.display = 'block';
    }

    // ── Password toggles ──
    function bindToggle(toggleId, inputId, showId, hideId) {
      document.getElementById(toggleId).addEventListener('click', () => {
        const inp = document.getElementById(inputId);
        const isHidden = inp.type === 'password';
        inp.type = isHidden ? 'text' : 'password';
        document.getElementById(showId).style.display = isHidden ? 'none' : 'block';
        document.getElementById(hideId).style.display = isHidden ? 'block' : 'none';
      });
    }
    bindToggle('pw-toggle-1', 'password',          'eye1-show', 'eye1-hide');
    bindToggle('pw-toggle-2', 'confirm-password',  'eye2-show', 'eye2-hide');

    // ── Password strength + requirements ──
    const pwInput    = document.getElementById('password');
    const confirmPw  = document.getElementById('confirm-password');
    const strengthW  = document.getElementById('strength-wrap');
    const strengthB  = document.getElementById('strength-bar');
    const strengthT  = document.getElementById('strength-text');

    pwInput.addEventListener('input', function() {
      const pw = this.value;

      // Show/hide strength
      strengthW.style.display = pw ? 'flex' : 'none';

      // Strength score
      let s = 0;
      if (pw.length >= 8)       s++;
      if (/[a-z]/.test(pw))     s++;
      if (/[A-Z]/.test(pw))     s++;
      if (/[0-9]/.test(pw))     s++;
      if (/[$@#&!]/.test(pw))   s++;
      const colors = ['#ef4444','#f59e0b','#eab308','#84cc16','#22c55e'];
      const labels = ['Weak','Fair','Good','Strong','Very Strong'];
      strengthB.style.width           = `${s * 20}%`;
      strengthB.style.backgroundColor = colors[s-1] || '#ef4444';
      strengthT.textContent           = labels[s-1] || '';
      strengthT.style.color           = colors[s-1] || '#ef4444';

      // Requirements
      toggle('req-len',   pw.length >= 8);
      toggle('req-upper', /[A-Z]/.test(pw));
      toggle('req-lower', /[a-z]/.test(pw));
      toggle('req-num',   /[0-9]/.test(pw));

      // Live match check on confirm field
      if (confirmPw.value) checkMatch();
    });

    confirmPw.addEventListener('input', checkMatch);

    function toggle(id, met) {
      document.getElementById(id).classList.toggle('met', met);
    }

    function checkMatch() {
      const pw  = pwInput.value;
      const cpw = confirmPw.value;
      if (!cpw) {
        confirmPw.classList.remove('match-ok','match-err');
        return;
      }
      confirmPw.classList.toggle('match-ok',  pw === cpw);
      confirmPw.classList.toggle('match-err', pw !== cpw);
    }

    // ── Alert helpers ──
    function showAlert(type, message) {
      const area = document.getElementById('alert-area');
      const icon = type === 'error'
        ? `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`
        : `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;
      area.innerHTML = `<div class="alert alert-${type}">${icon}<span>${message}</span></div>`;
      if (type === 'error') setTimeout(() => area.innerHTML = '', 6000);
    }

    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      const content = document.getElementById('btn-content');
      btn.disabled = on;
      content.innerHTML = on
        ? `<div class="spinner"></div><span>Updating password…</span>`
        : 'Set New Password';
    }

    // ── Form submit ──
    document.getElementById('reset-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const password        = pwInput.value;
      const confirmPassword = confirmPw.value;

      if (password.length < 8)          return showAlert('error', 'Password must be at least 8 characters.');
      if (password !== confirmPassword)  return showAlert('error', 'Passwords do not match.');

      setLoading(true);

      try {
        const response = await fetch('https://api.flowguard.ng/api/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (data.success) {
          // Replace form with success message
          document.getElementById('reset-form-wrap').innerHTML = `
            <div style="text-align:center;padding:8px 0">
              <div style="width:56px;height:56px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
                <svg style="width:26px;height:26px;color:#6ee7b7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              </div>
              <div style="font-family:'Outfit',sans-serif;font-size:21px;font-weight:700;margin-bottom:8px">Password Updated</div>
              <p style="font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:28px">Your password has been reset successfully. You can now sign in with your new credentials.</p>
              <a href="login.html" class="btn-primary" style="display:inline-block;width:auto;padding:13px 36px;text-decoration:none">Go to Login →</a>
            </div>`;
        } else {
          setLoading(false);
          showAlert('error', data.error || 'Failed to reset password. The link may have expired.');
        }
      } catch (err) {
        console.error('Reset error:', err);
        setLoading(false);
        showAlert('error', 'Connection failed. Please try again.');
      }
    });
  </script>
</body>
</html>
