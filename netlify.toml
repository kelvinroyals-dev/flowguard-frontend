[build]
  publish = "."

# Serve portal as the root on app.flowguard.ng
[[redirects]]
  from = "/"
  to = "/flowguard-client-portal.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/flowguard-client-portal.html"
  status = 200

# Catch-all for SPA — keeps URL clean on refresh
[[redirects]]
  from = "/*"
  to = "/flowguard-client-portal.html"
  status = 200
  conditions = {Host = ["app.flowguard.ng"]}
