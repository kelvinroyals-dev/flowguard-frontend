[build]
  publish = "."

# app.flowguard.ng serves the client portal (index.html) at root.
# index.html is served automatically at "/", so we only need the SPA
# catch-all so deep links / refreshes resolve back to the portal.

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

# SPA catch-all — keeps URL clean on refresh, but never intercept real files or /js assets
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Host = ["app.flowguard.ng"]}
